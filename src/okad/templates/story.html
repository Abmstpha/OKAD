<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OKAD — __SYSTEM_NAME__</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg: #0b0f0d;
    --bg-elev: #121816;
    --bg-card: #18201c;
    --ink: #eef4ef;
    --muted: #8b9a90;
    --line: #2a3530;
    --accent: #3dba8a;
    --accent-soft: color-mix(in srgb, var(--accent) 22%, transparent);
    --font-display: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --font-body: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font-body); }
  body {
    background:
      radial-gradient(900px 480px at 8% -8%, #152820 0%, transparent 55%),
      radial-gradient(700px 420px at 100% 0%, #1a1524 0%, transparent 50%),
      var(--bg);
    overflow: hidden;
  }
  header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 0.75rem 1.25rem;
    align-items: center;
    padding: 0.85rem 1.1rem;
    border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--bg) 86%, transparent);
    backdrop-filter: blur(8px);
  }
  .brand-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: 0.55rem 0.85rem; }
  .brand {
    font-family: var(--font-display);
    font-size: clamp(1.35rem, 2.4vw, 1.85rem);
    letter-spacing: 0.04em;
    line-height: 1;
    margin: 0;
  }
  .brand span { color: var(--accent); }
  .chips { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .chip {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 0.18rem 0.45rem;
    border-radius: 999px;
  }
  .chip.accent { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
  .tagline {
    color: var(--muted);
    margin: 0.35rem 0 0;
    max-width: 72ch;
    font-size: 0.82rem;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .tabs { display: flex; gap: 0.3rem; flex-wrap: wrap; justify-content: flex-end; }
  .tab {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 0.4rem 0.7rem;
    font: inherit;
    font-size: 0.82rem;
    cursor: pointer;
    border-radius: 4px;
  }
  .tab:hover { color: var(--ink); border-color: color-mix(in srgb, var(--accent) 35%, var(--line)); }
  .tab[aria-selected="true"] {
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
  }
  .toolbar {
    display: flex;
    gap: 0.35rem;
    align-items: center;
    justify-content: flex-end;
    grid-column: 1 / -1;
  }
  .toolbtn {
    background: var(--bg-elev);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 0.28rem 0.55rem;
    font: inherit;
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 4px;
  }
  .toolbtn:hover { border-color: var(--accent); }
  .hint { color: var(--muted); font-size: 0.72rem; margin-left: 0.35rem; }
  main {
    display: grid;
    grid-template-columns: minmax(220px, 280px) 1fr;
    height: calc(100vh - 118px);
  }
  aside {
    border-right: 1px solid var(--line);
    padding: 0.85rem;
    overflow: auto;
    background: color-mix(in srgb, var(--bg-elev) 92%, transparent);
  }
  aside h2 {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin: 0 0 0.65rem;
  }
  .list { display: flex; flex-direction: column; gap: 0.35rem; }
  .item {
    text-align: left;
    width: 100%;
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink);
    padding: 0.55rem 0.6rem;
    cursor: pointer;
    font: inherit;
    border-radius: 6px;
  }
  .item:hover, .item.active {
    border-color: var(--line);
    background: var(--bg-card);
  }
  .item.active {
    border-color: color-mix(in srgb, var(--accent) 50%, var(--line));
    box-shadow: 0 0 0 1px var(--accent-soft);
  }
  .item small { display: block; color: var(--muted); margin-top: 0.18rem; font-size: 0.72rem; line-height: 1.35; }
  .stage {
    position: relative;
    overflow: auto;
    padding: 1rem 1.25rem 2rem;
  }
  .stage-head {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    align-items: flex-start;
    margin-bottom: 0.85rem;
  }
  .stage-head h2 {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.35rem;
  }
  .stage-head p {
    margin: 0.35rem 0 0;
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.45;
    max-width: 70ch;
  }
  #diagram {
    min-height: 55vh;
    border: 1px solid var(--line);
    border-radius: 12px;
    background:
      linear-gradient(transparent 23px, color-mix(in srgb, var(--line) 28%, transparent) 24px),
      linear-gradient(90deg, transparent 23px, color-mix(in srgb, var(--line) 28%, transparent) 24px),
      var(--bg-elev);
    background-size: 24px 24px, 24px 24px, auto;
    padding: 1.25rem;
    overflow: auto;
  }
  #diagram .mermaid,
  #diagram svg {
    width: 100% !important;
    max-width: none !important;
    height: auto !important;
  }
  #diagram .error {
    color: #e87a6b;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    white-space: pre-wrap;
  }
  .source-panel {
    margin-top: 0.85rem;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--bg-elev);
    display: none;
  }
  .source-panel.open { display: block; }
  .source-panel header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.55rem 0.75rem;
    border-bottom: 1px solid var(--line);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .source-panel pre {
    margin: 0;
    padding: 0.85rem 1rem;
    overflow: auto;
    max-height: 28vh;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    line-height: 1.45;
    color: #c9d4cc;
  }
  .empty { padding: 2rem; color: var(--muted); }
  .inspector {
    position: absolute; right: 1rem; top: 1rem; width: min(340px, calc(100% - 2rem));
    background: color-mix(in srgb, var(--bg-elev) 96%, transparent);
    border: 1px solid var(--line);
    padding: 0.9rem;
    display: none;
    border-radius: 8px;
    backdrop-filter: blur(10px);
    z-index: 3;
  }
  .inspector.open { display: block; }
  .inspector h3 { margin: 0 0 0.35rem; font-family: var(--font-display); font-weight: 500; }
  .inspector p { margin: 0; color: var(--muted); font-size: 0.86rem; line-height: 1.45; }
  .inspector .meta { margin-top: 0.7rem; font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); white-space: pre-wrap; }
  .inspector .close {
    position: absolute; top: 0.45rem; right: 0.55rem;
    background: transparent; border: 0; color: var(--muted); cursor: pointer; font-size: 1rem;
  }
  @media (max-width: 900px) {
    header { grid-template-columns: 1fr; }
    main { grid-template-columns: 1fr; grid-template-rows: minmax(140px, 28vh) 1fr; height: calc(100vh - 150px); }
    aside { border-right: 0; border-bottom: 1px solid var(--line); }
    .tabs { justify-content: flex-start; }
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="brand-row">
      <h1 class="brand">OKAD <span>__SYSTEM_NAME__</span></h1>
      <div class="chips">
        <span class="chip accent">okad __OKAD_VERSION__</span>
        <span class="chip">story v__STORY_VERSION__</span>
        <span class="chip" id="chip-stats"></span>
      </div>
    </div>
    <p class="tagline">__SUMMARY__</p>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab" data-view="agents" aria-selected="true">Agents &amp; tools</button>
    <button class="tab" data-view="architecture">Architecture</button>
    <button class="tab" data-view="journeys">Journeys</button>
    <button class="tab" data-view="requests">Requests</button>
    <button class="tab" data-view="data">Data flow</button>
  </div>
  <div class="toolbar">
    <button class="toolbtn" id="btn-source" type="button">Show Mermaid source</button>
    <button class="toolbtn" id="btn-copy" type="button">Copy source</button>
    <span class="hint">diagrams rendered with Mermaid</span>
  </div>
</header>
<main>
  <aside>
    <h2 id="side-title">Stories</h2>
    <div class="list" id="side-list"></div>
  </aside>
  <section class="stage">
    <div class="stage-head">
      <div>
        <h2 id="focus-title">Loading…</h2>
        <p id="focus-summary"></p>
      </div>
    </div>
    <div id="diagram"><div class="empty">Rendering…</div></div>
    <div class="source-panel" id="source-panel">
      <header>
        <span>Mermaid source</span>
      </header>
      <pre id="source-pre"></pre>
    </div>
    <div class="inspector" id="inspector">
      <button class="close" id="ins-close" type="button" aria-label="Close">×</button>
      <h3 id="ins-title"></h3>
      <p id="ins-body"></p>
      <div class="meta" id="ins-meta"></div>
    </div>
  </section>
</main>
<script>
const DATA = __DATA__;
const LAYER_ORDER = ['experience','interface','application','data','infra'];

let view = 'agents';
let focusId = null;
let lastMermaid = '';
let showSource = false;

const sideList = document.getElementById('side-list');
const sideTitle = document.getElementById('side-title');
const diagram = document.getElementById('diagram');
const focusTitle = document.getElementById('focus-title');
const focusSummary = document.getElementById('focus-summary');
const sourcePanel = document.getElementById('source-panel');
const sourcePre = document.getElementById('source-pre');
const inspector = document.getElementById('inspector');

document.getElementById('chip-stats').textContent =
  `${(DATA.nodes||[]).filter(n => n.kind !== 'layer').length} nodes · ${(DATA.agents||[]).length} agents · ${(DATA.journeys||[]).length} journeys · ${(DATA.requests||[]).length} requests`;

mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  securityLevel: 'loose',
  fontFamily: 'IBM Plex Sans, Segoe UI, sans-serif',
  themeVariables: {
    darkMode: true,
    background: '#121816',
    primaryColor: '#1a2420',
    primaryTextColor: '#eef4ef',
    primaryBorderColor: '#3dba8a',
    lineColor: '#8a9a90',
    secondaryColor: '#1c221f',
    tertiaryColor: '#151b18',
    noteBkgColor: '#18201c',
    noteTextColor: '#eef4ef',
    actorBkg: '#1a2420',
    actorBorder: '#3dba8a',
    actorTextColor: '#eef4ef',
    signalColor: '#c9d4cc',
    signalTextColor: '#eef4ef',
  },
  flowchart: {
    curve: 'basis',
    htmlLabels: true,
    nodeSpacing: 42,
    rankSpacing: 56,
    padding: 16,
  },
  sequence: {
    mirrorActors: false,
    bottomMarginAdj: 8,
    messageMargin: 36,
    actorMargin: 48,
    useMaxWidth: true,
  },
});

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.setAttribute('aria-selected', 'false'));
    btn.setAttribute('aria-selected', 'true');
    view = btn.dataset.view;
    focusId = null;
    render();
  });
});

document.getElementById('btn-source').onclick = () => {
  showSource = !showSource;
  sourcePanel.classList.toggle('open', showSource);
  document.getElementById('btn-source').textContent = showSource ? 'Hide Mermaid source' : 'Show Mermaid source';
};
document.getElementById('btn-copy').onclick = async () => {
  try {
    await navigator.clipboard.writeText(lastMermaid || '');
    document.getElementById('btn-copy').textContent = 'Copied';
    setTimeout(() => { document.getElementById('btn-copy').textContent = 'Copy source'; }, 1200);
  } catch (_) {}
};
document.getElementById('ins-close').onclick = () => inspector.classList.remove('open');

function nodeMap() {
  const m = {};
  (DATA.nodes || []).forEach(n => { m[n.id] = n; });
  return m;
}

function inferAgents() {
  if (Array.isArray(DATA.agents) && DATA.agents.length) {
    return DATA.agents.map(a => ({
      id: a.id,
      name: a.name,
      summary: a.summary || '',
      role: a.role || '',
      level: a.level || 'orchestrator',
      parent_id: a.parent_id || null,
      node_id: a.node_id || null,
      flow: a.flow || [],
      relations: a.relations || [],
      tools: a.tools || [],
    }));
  }
  return [];
}

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function escM(s) {
  return String(s || '')
    .replace(/[\[\]#;{}()<>|"]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .slice(0, 48);
}

function sid(prefix, i) {
  return `${prefix}${i}`;
}

function classBlock() {
  return [
    '  classDef system fill:#241a2a,stroke:#c49bff,color:#fff,stroke-width:2px',
    '  classDef orch fill:#2a1f18,stroke:#ff9f6b,color:#fff,stroke-width:2px',
    '  classDef sub fill:#2a2418,stroke:#e2b15c,color:#fff,stroke-width:1.8px',
    '  classDef tool fill:#152028,stroke:#9ad7ff,color:#fff,stroke-width:1.5px',
    '  classDef screen fill:#15202a,stroke:#6eb8ff,color:#fff',
    '  classDef route fill:#15241c,stroke:#3dba8a,color:#fff',
    '  classDef service fill:#242014,stroke:#e2b15c,color:#fff',
    '  classDef store fill:#241816,stroke:#e87a6b,color:#fff',
    '  classDef infra fill:#1e1828,stroke:#c49bff,color:#fff',
  ].join('\n');
}

function kindClass(kind, layer) {
  if (kind === 'screen' || kind === 'action') return 'screen';
  if (kind === 'route' || kind === 'handler') return 'route';
  if (kind === 'store' || kind === 'entity') return 'store';
  if (kind === 'external' || layer === 'infra') return 'infra';
  if (kind === 'service' || kind === 'agent') return 'service';
  return 'service';
}

function setFocusMeta(title, summary) {
  focusTitle.textContent = title || 'Map';
  focusSummary.textContent = summary || '';
}

function bindSide(items, onPick) {
  sideList.innerHTML = items.map(it =>
    `<button class="item ${it.id === focusId ? 'active' : ''}" data-id="${esc(it.id)}"><strong>${esc(it.name)}</strong><small>${esc(it.summary || '')}</small></button>`
  ).join('') || `<div class="empty">Nothing here yet.</div>`;
  sideList.querySelectorAll('.item').forEach(btn => {
    btn.addEventListener('click', () => {
      focusId = btn.dataset.id;
      const hit = items.find(i => i.id === focusId);
      if (hit && hit._raw) showInspector(hit._raw);
      onPick();
    });
  });
}

function showInspector(n) {
  if (!n) return;
  inspector.classList.add('open');
  document.getElementById('ins-title').textContent = n.label || n.name || n.id;
  document.getElementById('ins-body').textContent = n.summary || n.role || 'No summary.';
  document.getElementById('ins-meta').textContent = [
    n.kind && `kind: ${n.kind}`,
    n.level && `level: ${n.level}`,
    n.layer && `layer: ${n.layer}`,
    n.role && `role: ${n.role}`,
    n.source && `source: ${n.source}`,
    n.id && `id: ${n.id}`,
  ].filter(Boolean).join('\n');
}

function mermaidAgents() {
  const agents = inferAgents();
  const roots = agents.filter(a => a.level === 'system' || a.level === 'orchestrator');
  sideTitle.textContent = 'Agent fleet';

  const side = [
    { id: '__fleet__', name: 'Fleet overview', summary: `${agents.length} agents · hierarchy + tools + relations` },
    ...roots.map(a => ({
      id: a.id,
      name: a.name,
      summary: a.role || a.summary || `${(a.flow || []).length} steps · ${(a.tools || []).length} tools`,
      _raw: a,
    })),
  ];
  if (!focusId) focusId = '__fleet__';
  bindSide(side, () => render());

  if (focusId === '__fleet__') {
    setFocusMeta('Agentic architecture', 'Orchestrators, relations, and ownership — Mermaid flowchart.');
    const lines = ['flowchart TB'];
    const idx = {};
    roots.forEach((a, i) => {
      const id = sid('A', i);
      idx[a.id] = id;
      const cls = a.level === 'system' ? 'system' : 'orch';
      const label = a.role ? `${escM(a.name)}\\n${escM(a.role)}` : escM(a.name);
      lines.push(`  ${id}(["${label}"]):::${cls}`);
    });
    roots.forEach(a => {
      if (a.parent_id && idx[a.parent_id] && idx[a.id]) {
        lines.push(`  ${idx[a.parent_id]} -->|owns| ${idx[a.id]}`);
      }
      (a.relations || []).forEach(r => {
        if (!idx[a.id] || !idx[r.target]) return;
        lines.push(`  ${idx[a.id]} -->|${escM(r.label || r.kind || 'relates')}| ${idx[r.target]}`);
      });
    });
    // preview first tools under each orch as compact nodes
    roots.forEach((a, i) => {
      const kids = agents.filter(c => c.parent_id === a.id || (a.flow || []).includes(c.id)).slice(0, 5);
      kids.forEach((c, j) => {
        const kid = sid(`S${i}_`, j);
        lines.push(`  ${kid}["${escM(c.name)}"]:::sub`);
        lines.push(`  ${idx[a.id]} --> ${kid}`);
      });
    });
    lines.push(classBlock());
    return lines.join('\n');
  }

  const current = agents.find(a => a.id === focusId) || roots[0];
  setFocusMeta(current.name, [current.role, current.summary].filter(Boolean).join(' — '));
  const kids = agents.filter(a => a.parent_id === current.id || (current.flow || []).includes(a.id));
  const lines = ['flowchart LR'];
  const cls = current.level === 'system' ? 'system' : 'orch';
  lines.push(`  ORCH(["${escM(current.name)}\\n${escM(current.role || current.level)}"]):::${cls}`);

  if (!kids.length && (current.tools || []).length) {
    (current.tools || []).forEach((t, i) => {
      lines.push(`  T${i}["${escM(t.name)}"]:::tool`);
      lines.push(`  ORCH -->|uses| T${i}`);
    });
  } else {
    kids.forEach((c, i) => {
      lines.push(`  S${i}(["${escM(c.name)}"]):::sub`);
      lines.push(`  ORCH -->|${i === 0 ? 'runs' : 'then'}| S${i}`);
      if (i > 0) lines.push(`  S${i - 1} --> S${i}`);
      (c.tools || []).forEach((t, ti) => {
        lines.push(`  T${i}_${ti}["${escM(t.name)}"]:::tool`);
        lines.push(`  S${i} -->|tool| T${i}_${ti}`);
      });
    });
    (current.tools || []).forEach((t, i) => {
      lines.push(`  OT${i}["${escM(t.name)}"]:::tool`);
      lines.push(`  ORCH -->|uses| OT${i}`);
    });
  }
  (current.relations || []).forEach((r, i) => {
    const target = agents.find(a => a.id === r.target);
    if (!target) return;
    lines.push(`  R${i}(["${escM(target.name)}"]):::orch`);
    lines.push(`  ORCH -->|${escM(r.label || r.kind)}| R${i}`);
  });
  lines.push(classBlock());
  return lines.join('\n');
}

function mermaidArchitecture() {
  sideTitle.textContent = 'Layers';
  const nodes = (DATA.nodes || []).filter(n => n.kind !== 'layer');
  const by = {};
  LAYER_ORDER.forEach(l => { by[l] = []; });
  nodes.forEach(n => {
    const layer = by[n.layer] ? n.layer : 'application';
    by[layer].push(n);
  });
  const side = LAYER_ORDER.map(l => ({
    id: `layer:${l}`,
    name: l,
    summary: `${by[l].length} nodes`,
  }));
  if (!focusId) focusId = 'layer:all';
  bindSide([{ id: 'layer:all', name: 'All layers', summary: `${nodes.length} nodes` }, ...side], () => render());

  const nm = nodeMap();
  const keep = new Set();
  if (focusId === 'layer:all') {
    LAYER_ORDER.forEach(l => by[l].slice(0, 8).forEach(n => keep.add(n.id)));
    setFocusMeta('Architecture', 'Layered map of the highest-signal nodes (capped for readability).');
  } else {
    const layer = focusId.split(':')[1];
    by[layer].slice(0, 18).forEach(n => keep.add(n.id));
    // include neighbors
    (DATA.edges || []).forEach(e => {
      if (keep.has(e.source)) keep.add(e.target);
      if (keep.has(e.target)) keep.add(e.source);
    });
    setFocusMeta(`${layer} layer`, (DATA.layers || []).find(x => x.id === layer)?.blurb || '');
  }

  const lines = ['flowchart LR'];
  LAYER_ORDER.forEach((l, li) => {
    const items = [...keep].map(id => nm[id]).filter(n => n && n.layer === l);
    if (!items.length) return;
    lines.push(`  subgraph L${li}["${l}"]`);
    items.forEach((n, i) => {
      const id = `N${li}_${i}`;
      n._mid = id;
      lines.push(`    ${id}["${escM(n.label)}"]:::${kindClass(n.kind, n.layer)}`);
    });
    lines.push('  end');
  });
  const idOf = {};
  LAYER_ORDER.forEach((l, li) => {
    [...keep].map(id => nm[id]).filter(n => n && n.layer === l).forEach((n, i) => {
      idOf[n.id] = `N${li}_${i}`;
    });
  });
  (DATA.edges || []).filter(e => e.kind !== 'contains' && idOf[e.source] && idOf[e.target]).slice(0, 40).forEach(e => {
    lines.push(`  ${idOf[e.source]} -->|${escM(e.label || e.kind)}| ${idOf[e.target]}`);
  });
  lines.push(classBlock());
  return lines.join('\n');
}

function mermaidPath(mode) {
  const nm = nodeMap();
  let items = [];
  if (mode === 'journeys') {
    sideTitle.textContent = 'User journeys';
    items = (DATA.journeys || []).map(j => ({
      id: j.id, name: j.name, summary: j.summary || '', _raw: j, _mode: 'journeys'
    }));
  } else if (mode === 'requests') {
    sideTitle.textContent = 'Request paths';
    items = (DATA.requests || []).map(r => ({
      id: r.id,
      name: r.name,
      summary: `${r.method || ''} ${r.route || ''}`.trim() || r.summary || '',
      _raw: r,
      _mode: 'requests',
    }));
  } else {
    sideTitle.textContent = 'Data flows';
    items = (DATA.data_flows || []).map(d => ({
      id: d.id, name: d.name, summary: d.summary || d.shape || '', _raw: d, _mode: 'data'
    }));
  }
  if (!items.length) {
    bindSide([], () => {});
    setFocusMeta(`No ${mode}`, 'Re-run /okad so the model can author this view.');
    return 'flowchart LR\n  X[Nothing authored yet]';
  }
  if (!focusId || !items.find(i => i.id === focusId)) focusId = items[0].id;
  bindSide(items, () => render());
  const current = items.find(i => i.id === focusId)._raw;
  setFocusMeta(current.name, current.summary || `${current.method || ''} ${current.route || ''}`.trim() || current.shape || '');

  let stepIds = [];
  if (mode === 'journeys') stepIds = (current.steps || []).map(s => s.node_id || s);
  else if (mode === 'requests') stepIds = current.steps || [];
  else stepIds = [current.origin, ...(current.through || []), current.destination].filter(Boolean);

  const unique = [];
  stepIds.forEach(id => { if (id && !unique.includes(id)) unique.push(id); });

  // Prefer sequence diagrams for request/journey — this is what people expect
  if (mode === 'requests' || mode === 'journeys') {
    const lines = ['sequenceDiagram'];
    if (mode === 'requests' && current.method) {
      lines.push(`  autonumber`);
    }
    const actors = unique.map((id, i) => {
      const n = nm[id] || { id, label: id, kind: 'service' };
      const key = `N${i}`;
      lines.push(`  participant ${key} as ${escM(n.label || id)}`);
      return { key, n, note: (current.steps || [])[i]?.note };
    });
    for (let i = 0; i < actors.length - 1; i++) {
      const note = (current.steps && current.steps[i] && current.steps[i].note) || (mode === 'requests' ? 'calls' : 'next');
      lines.push(`  ${actors[i].key}->>${actors[i + 1].key}: ${escM(note)}`);
    }
    if (current.status && current.status.length) {
      lines.push(`  Note over ${actors[actors.length - 1].key}: status ${escM(current.status.join(' / '))}`);
    }
    return lines.join('\n');
  }

  // data flow: LR flowchart
  const lines = ['flowchart LR'];
  unique.forEach((id, i) => {
    const n = nm[id] || { id, label: id, kind: 'service', layer: 'application' };
    lines.push(`  N${i}["${escM(n.label || id)}"]:::${kindClass(n.kind, n.layer)}`);
    if (i > 0) lines.push(`  N${i - 1} --> N${i}`);
  });
  if (current.shape) {
    lines.push(`  SHAPE["${escM(current.shape)}"]:::tool`);
    if (unique.length) lines.push(`  N${unique.length - 1} -.-> SHAPE`);
  }
  lines.push(classBlock());
  return lines.join('\n');
}

function mermaidForCurrent() {
  if (view === 'agents') return mermaidAgents();
  if (view === 'architecture') return mermaidArchitecture();
  if (view === 'journeys') return mermaidPath('journeys');
  if (view === 'requests') return mermaidPath('requests');
  return mermaidPath('data');
}

async function render() {
  const code = mermaidForCurrent();
  lastMermaid = code;
  sourcePre.textContent = code;
  diagram.innerHTML = '<div class="empty">Rendering Mermaid…</div>';
  const id = 'okad-mmd-' + Date.now();
  try {
    const { svg } = await mermaid.render(id, code);
    diagram.innerHTML = svg;
    const svgEl = diagram.querySelector('svg');
    if (svgEl) {
      svgEl.removeAttribute('height');
      svgEl.style.width = '100%';
      svgEl.style.maxWidth = 'none';
      svgEl.style.height = 'auto';
    }
  } catch (err) {
    diagram.innerHTML = `<pre class="error">${esc(String(err))}\n\n${esc(code)}</pre>`;
  }
}

render();
</script>
</body>
