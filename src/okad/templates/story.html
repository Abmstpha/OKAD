<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OKAD — __SYSTEM_NAME__</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #070a09;
    --bg-elev: #0e1411;
    --bg-card: #141c18;
    --bg-card-2: #1a2420;
    --ink: #f2f6f3;
    --muted: #8d9b92;
    --line: #27322c;
    --line-strong: #3a4840;
    --accent: #3dba8a;
    --accent-dim: color-mix(in srgb, var(--accent) 18%, transparent);
    --warn: #e2b15c;
    --danger: #e87a6b;
    --violet: #b89cff;
    --sky: #7ec8ff;
    --font-display: "Newsreader", "Iowan Old Style", Georgia, serif;
    --font-body: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, monospace;
    --experience: #7ec8ff;
    --interface: #3dba8a;
    --application: #e2b15c;
    --data: #e87a6b;
    --infra: #b89cff;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font-body); }
  body {
    background:
      radial-gradient(1000px 520px at 0% -10%, #10261c 0%, transparent 55%),
      radial-gradient(800px 420px at 100% 0%, #16122a 0%, transparent 48%),
      var(--bg);
    overflow: hidden;
  }
  header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 0.65rem 1rem;
    align-items: center;
    padding: 0.85rem 1.15rem;
    border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--bg) 86%, transparent);
    backdrop-filter: blur(12px);
    z-index: 6;
  }
  .brand-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: 0.45rem 0.75rem; }
  .brand {
    font-family: var(--font-display);
    font-size: clamp(1.35rem, 2.4vw, 1.85rem);
    font-weight: 600;
    letter-spacing: 0.02em;
    margin: 0;
    line-height: 1;
  }
  .brand span { color: var(--accent); }
  .chips { display: flex; flex-wrap: wrap; gap: 0.28rem; }
  .chip {
    font-family: var(--font-mono);
    font-size: 0.64rem;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 0.14rem 0.4rem;
    border-radius: 999px;
  }
  .chip.accent { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 50%, var(--line)); }
  .tagline {
    color: var(--muted);
    margin: 0.35rem 0 0;
    max-width: 78ch;
    font-size: 0.8rem;
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .tabs { display: flex; gap: 0.28rem; flex-wrap: wrap; justify-content: flex-end; }
  .tab {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 0.4rem 0.7rem;
    font: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    border-radius: 6px;
    transition: border-color .15s, background .15s, color .15s;
  }
  .tab:hover { border-color: var(--line-strong); color: var(--ink); }
  .tab[aria-selected="true"] {
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
  }
  .toolbar {
    grid-column: 1 / -1;
    display: flex;
    gap: 0.35rem;
    align-items: center;
    justify-content: flex-end;
  }
  .toolbtn {
    background: var(--bg-elev);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 0.3rem 0.6rem;
    font: inherit;
    font-size: 0.74rem;
    cursor: pointer;
    border-radius: 6px;
  }
  .toolbtn:hover { border-color: var(--accent); }
  .hint { color: var(--muted); font-size: 0.68rem; margin-left: 0.25rem; }
  main {
    display: grid;
    grid-template-columns: minmax(230px, 290px) 1fr;
    height: calc(100vh - 118px);
  }
  aside {
    border-right: 1px solid var(--line);
    padding: 0.9rem;
    overflow: auto;
    background: color-mix(in srgb, var(--bg-elev) 92%, transparent);
  }
  aside h2 {
    font-size: 0.64rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    margin: 0 0 0.65rem;
  }
  .list { display: flex; flex-direction: column; gap: 0.3rem; }
  .item {
    text-align: left;
    width: 100%;
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink);
    padding: 0.55rem 0.6rem;
    cursor: pointer;
    font: inherit;
    border-radius: 8px;
    transition: background .12s, border-color .12s;
  }
  .item:hover { border-color: var(--line); background: var(--bg-card); }
  .item.active {
    border-color: color-mix(in srgb, var(--accent) 55%, var(--line));
    background: color-mix(in srgb, var(--accent) 8%, var(--bg-card));
  }
  .item strong { display: block; font-size: 0.86rem; font-weight: 600; }
  .item small { display: block; color: var(--muted); margin-top: 0.18rem; font-size: 0.7rem; line-height: 1.35; }
  .stage {
    position: relative;
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 0;
  }
  .stage-head {
    padding: 0.85rem 1.15rem 0.55rem;
    border-bottom: 1px solid var(--line);
  }
  .stage-head h2 {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.35rem;
  }
  .stage-head p {
    margin: 0.35rem 0 0;
    color: var(--muted);
    font-size: 0.86rem;
    line-height: 1.45;
    max-width: 90ch;
  }
  #board {
    width: 100%;
    height: 100%;
    min-height: 0;
    overflow: auto;
    display: none;
    padding: 1.1rem 1.2rem 2rem;
    background:
      linear-gradient(to right, color-mix(in srgb, var(--line) 28%, transparent) 1px, transparent 1px) 0 0 / 56px 56px,
      linear-gradient(to bottom, color-mix(in srgb, var(--line) 28%, transparent) 1px, transparent 1px) 0 0 / 56px 56px;
  }
  #board.active { display: block; }
  .empty { padding: 2rem; color: var(--muted); }
  .inspector {
    position: absolute; right: 0.9rem; top: 4.4rem; width: min(360px, calc(100% - 1.8rem));
    background: color-mix(in srgb, var(--bg-elev) 96%, transparent);
    border: 1px solid var(--line);
    padding: 0.95rem;
    display: none;
    border-radius: 10px;
    backdrop-filter: blur(12px);
    z-index: 5;
    max-height: calc(100% - 5.2rem);
    overflow: auto;
    box-shadow: 0 18px 50px rgba(0,0,0,.35);
  }
  .inspector.open { display: block; }
  .inspector h3 { margin: 0 0 0.35rem; font-family: var(--font-display); font-weight: 500; padding-right: 1.4rem; }
  .inspector p { margin: 0; color: var(--muted); font-size: 0.85rem; line-height: 1.5; }
  .inspector .meta { margin-top: 0.7rem; font-family: var(--font-mono); font-size: 0.66rem; color: var(--muted); white-space: pre-wrap; }
  .inspector .close {
    position: absolute; top: 0.45rem; right: 0.55rem;
    background: transparent; border: 0; color: var(--muted); cursor: pointer; font-size: 1.1rem;
  }

  /* ——— Agents org ——— */
  .fleet { display: flex; flex-direction: column; gap: 1.15rem; max-width: 1180px; }
  .system-card {
    border: 1px solid color-mix(in srgb, var(--violet) 45%, var(--line));
    background: linear-gradient(135deg, #17121f 0%, var(--bg-card) 60%);
    border-radius: 14px;
    padding: 1rem 1.1rem;
    animation: rise .45s ease both;
  }
  .system-card .eyebrow {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--violet);
    margin: 0 0 0.25rem;
  }
  .system-card h3 {
    margin: 0;
    font-family: var(--font-display);
    font-size: 1.35rem;
    font-weight: 550;
  }
  .system-card p { margin: 0.35rem 0 0; color: var(--muted); font-size: 0.84rem; line-height: 1.45; max-width: 70ch; }
  .orch-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 0.9rem;
  }
  .orch {
    border: 1px solid color-mix(in srgb, #ff9f6b 40%, var(--line));
    background: linear-gradient(180deg, #1c1612 0%, var(--bg-card) 40%);
    border-radius: 12px;
    padding: 0.85rem 0.9rem 0.95rem;
    cursor: pointer;
    transition: transform .15s, border-color .15s, box-shadow .15s;
    animation: rise .5s ease both;
  }
  .orch:hover {
    transform: translateY(-2px);
    border-color: #ff9f6b;
    box-shadow: 0 12px 32px rgba(0,0,0,.28);
  }
  .orch .level {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #ff9f6b;
    margin: 0 0 0.2rem;
  }
  .orch h4 {
    margin: 0;
    font-size: 1.02rem;
    font-weight: 650;
    letter-spacing: -0.01em;
  }
  .orch .role { margin: 0.3rem 0 0.75rem; color: var(--muted); font-size: 0.78rem; line-height: 1.4; min-height: 2.2em; }
  .subs {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .sub {
    display: grid;
    grid-template-columns: 8px 1fr;
    gap: 0.55rem;
    align-items: start;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.5rem 0.55rem;
    cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  .sub:hover { border-color: var(--warn); background: #1a1710; }
  .sub .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--warn); margin-top: 0.35rem;
  }
  .sub .name { font-size: 0.82rem; font-weight: 600; }
  .sub .sum { color: var(--muted); font-size: 0.7rem; line-height: 1.35; margin-top: 0.12rem; }
  .tools {
    display: flex; flex-wrap: wrap; gap: 0.28rem; margin-top: 0.4rem;
  }
  .tool {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--sky);
    border: 1px solid color-mix(in srgb, var(--sky) 35%, var(--line));
    background: #101820;
    padding: 0.12rem 0.35rem;
    border-radius: 999px;
  }
  .rel-row {
    display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.7rem;
  }
  .rel {
    font-size: 0.68rem;
    color: var(--muted);
    border: 1px dashed var(--line-strong);
    padding: 0.18rem 0.4rem;
    border-radius: 999px;
  }

  /* ——— Architecture / journey map ——— */
  .arch { display: flex; flex-direction: column; gap: 1.25rem; max-width: 1280px; }
  .path {
    position: relative;
    display: flex;
    gap: 0;
    overflow-x: auto;
    padding: 0.35rem 0.15rem 0.85rem;
    scroll-snap-type: x proximity;
  }
  .path::-webkit-scrollbar { height: 6px; }
  .path::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 99px; }
  .step {
    position: relative;
    flex: 0 0 168px;
    scroll-snap-align: start;
    padding-right: 28px;
    animation: rise .4s ease both;
  }
  .step::after {
    content: "";
    position: absolute;
    top: 28px; right: 6px;
    width: 16px; height: 2px;
    background: linear-gradient(90deg, var(--line-strong), transparent);
  }
  .step:last-child::after { display: none; }
  .step-card {
    border: 1px solid var(--line);
    background: var(--bg-card);
    border-radius: 12px;
    padding: 0.7rem 0.75rem;
    min-height: 108px;
    cursor: pointer;
    transition: border-color .15s, transform .15s;
  }
  .step-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .step-num {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    color: var(--accent);
    letter-spacing: 0.08em;
  }
  .step-card h4 {
    margin: 0.25rem 0 0.35rem;
    font-size: 0.9rem;
    font-weight: 650;
    line-height: 1.25;
  }
  .layer-pill {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.58rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.12rem 0.35rem;
    border-radius: 999px;
    border: 1px solid var(--line);
  }
  .layer-pill.experience { color: var(--experience); border-color: color-mix(in srgb, var(--experience) 45%, var(--line)); }
  .layer-pill.interface { color: var(--interface); border-color: color-mix(in srgb, var(--interface) 45%, var(--line)); }
  .layer-pill.application { color: var(--application); border-color: color-mix(in srgb, var(--application) 45%, var(--line)); }
  .layer-pill.data { color: var(--data); border-color: color-mix(in srgb, var(--data) 45%, var(--line)); }
  .layer-pill.infra { color: var(--infra); border-color: color-mix(in srgb, var(--infra) 45%, var(--line)); }
  .note { margin-top: 0.35rem; color: var(--muted); font-size: 0.68rem; line-height: 1.3; }

  .lanes {
    display: grid;
    grid-template-columns: repeat(5, minmax(140px, 1fr));
    gap: 0.65rem;
    align-items: start;
  }
  .lane {
    border: 1px dashed color-mix(in srgb, var(--line-strong) 80%, transparent);
    border-radius: 12px;
    background: color-mix(in srgb, var(--bg-elev) 70%, transparent);
    min-height: 160px;
    padding: 0.55rem;
    animation: rise .55s ease both;
  }
  .lane-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.4rem;
    margin-bottom: 0.5rem;
    padding: 0.15rem 0.2rem 0.45rem;
    border-bottom: 1px solid var(--line);
  }
  .lane-head span {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .lane-head em {
    font-style: normal;
    font-family: var(--font-mono);
    font-size: 0.58rem;
    color: var(--muted);
  }
  .lane.experience .lane-head span { color: var(--experience); }
  .lane.interface .lane-head span { color: var(--interface); }
  .lane.application .lane-head span { color: var(--application); }
  .lane.data .lane-head span { color: var(--data); }
  .lane.infra .lane-head span { color: var(--infra); }
  .node {
    border: 1px solid var(--line);
    background: var(--bg-card-2);
    border-radius: 8px;
    padding: 0.5rem 0.55rem;
    margin-bottom: 0.4rem;
    cursor: pointer;
    transition: border-color .12s, transform .12s;
  }
  .node:hover { transform: translateY(-1px); }
  .node.experience { border-left: 3px solid var(--experience); }
  .node.interface { border-left: 3px solid var(--interface); }
  .node.application { border-left: 3px solid var(--application); }
  .node.data { border-left: 3px solid var(--data); }
  .node.infra { border-left: 3px solid var(--infra); }
  .node .kind {
    font-family: var(--font-mono);
    font-size: 0.56rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .node .title { font-size: 0.78rem; font-weight: 600; margin-top: 0.15rem; line-height: 1.25; }
  .edge-list {
    margin-top: 0.15rem;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--bg-elev);
    padding: 0.7rem 0.85rem;
  }
  .edge-list h5 {
    margin: 0 0 0.5rem;
    font-size: 0.66rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  .edge {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0.55rem;
    align-items: center;
    padding: 0.4rem 0;
    border-top: 1px solid color-mix(in srgb, var(--line) 70%, transparent);
    font-size: 0.76rem;
  }
  .edge:first-of-type { border-top: 0; }
  .edge .src, .edge .tgt { color: var(--ink); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .edge .tgt { text-align: right; }
  .edge .mid {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    color: #ff9f6b;
    white-space: nowrap;
    padding: 0.12rem 0.4rem;
    border-radius: 999px;
    border: 1px solid color-mix(in srgb, #ff9f6b 35%, var(--line));
  }

  /* ——— Data pipeline ——— */
  .pipe {
    display: flex;
    align-items: stretch;
    gap: 0;
    overflow-x: auto;
    padding-bottom: 0.5rem;
  }
  .pipe-step {
    flex: 0 0 190px;
    position: relative;
    padding-right: 34px;
  }
  .pipe-step::after {
    content: "→";
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 1.1rem;
  }
  .pipe-step:last-child::after { display: none; }
  .pipe-card {
    height: 100%;
    border: 1px solid var(--line);
    background: var(--bg-card);
    border-radius: 12px;
    padding: 0.85rem;
    cursor: pointer;
  }
  .pipe-card:hover { border-color: var(--accent); }
  .pipe-card .i {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    color: var(--accent);
  }
  .pipe-card h4 { margin: 0.3rem 0; font-size: 0.95rem; }
  .pipe-card p { margin: 0; color: var(--muted); font-size: 0.74rem; line-height: 1.4; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 0.45rem 0.85rem;
    margin-top: 0.2rem;
    color: var(--muted);
    font-size: 0.68rem;
  }
  .legend i {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 0.3rem;
  }


  /* ——— Vertical story rail (no diagrams) ——— */
  .rail {
    max-width: 720px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    padding-left: 0.2rem;
  }
  .rail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1rem;
  }
  .badge {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 0.18rem 0.45rem;
    border-radius: 999px;
  }
  .badge.ok { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
  .rail-step {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 0.85rem;
    position: relative;
    padding-bottom: 1.15rem;
    animation: rise .4s ease both;
  }
  .rail-step:last-child { padding-bottom: 0; }
  .rail-step::before {
    content: "";
    position: absolute;
    left: 15px;
    top: 34px;
    bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--line-strong), transparent);
  }
  .rail-step:last-child::before { display: none; }
  .rail-idx {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: var(--bg-elev);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 600;
    display: grid;
    place-items: center;
    z-index: 1;
  }
  .rail-card {
    border: 1px solid var(--line);
    background: var(--bg-card);
    border-radius: 12px;
    padding: 0.85rem 0.95rem;
    cursor: pointer;
    transition: border-color .15s, transform .15s, box-shadow .15s;
  }
  .rail-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 10px 28px rgba(0,0,0,.25);
  }
  .rail-card .top {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: center;
    margin-bottom: 0.35rem;
  }
  .rail-card h4 {
    margin: 0;
    font-size: 1.02rem;
    font-weight: 650;
    letter-spacing: -0.01em;
  }
  .rail-card .sum {
    margin: 0.25rem 0 0;
    color: var(--muted);
    font-size: 0.8rem;
    line-height: 1.45;
  }
  .rail-card .arrow {
    margin-top: 0.55rem;
    font-family: var(--font-mono);
    font-size: 0.62rem;
    color: #ff9f6b;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: none; }
  }
  .orch:nth-child(1) { animation-delay: .04s; }
  .orch:nth-child(2) { animation-delay: .08s; }
  .orch:nth-child(3) { animation-delay: .12s; }
  .orch:nth-child(4) { animation-delay: .16s; }
  .step:nth-child(1) .step-card { animation: rise .35s ease both; }
  .step:nth-child(2) .step-card { animation: rise .4s ease both .04s; }
  .step:nth-child(3) .step-card { animation: rise .4s ease both .08s; }
  .step:nth-child(4) .step-card { animation: rise .4s ease both .12s; }
  .step:nth-child(5) .step-card { animation: rise .4s ease both .16s; }
  .step:nth-child(6) .step-card { animation: rise .4s ease both .2s; }
  .step:nth-child(7) .step-card { animation: rise .4s ease both .24s; }

  @media (max-width: 980px) {
    header { grid-template-columns: 1fr; }
    main { grid-template-columns: 1fr; grid-template-rows: minmax(120px, 24vh) 1fr; height: calc(100vh - 155px); }
    aside { border-right: 0; border-bottom: 1px solid var(--line); }
    .lanes { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 640px) {
    .lanes { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="brand-row">
      <h1 class="brand">OKAD <span>__SYSTEM_NAME__</span></h1>
      <div class="chips">
        <span class="chip accent">okad __OKAD_VERSION__</span>
        <span class="chip">story v__STORY_VERSION__</span>
        <span class="chip" id="chip-engine">Zero diagrams</span>
        <span class="chip" id="chip-stats"></span>
      </div>
    </div>
    <p class="tagline">__SUMMARY__</p>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab" data-view="agents" aria-selected="true">Agents &amp; tools</button>
    <button class="tab" data-view="architecture">Architecture</button>
    <button class="tab" data-view="journeys">Journeys</button>
    <button class="tab" data-view="requests">Requests</button>
    <button class="tab" data-view="data">Data flow</button>
  </div>
  <div class="toolbar">
    <button class="toolbtn" id="btn-top" type="button">Top</button>
    <span class="hint" id="engine-hint">Zero diagrams · Agents org · Journey rails · Layer lanes</span>
  </div>
</header>
<main>
  <aside>
    <h2 id="side-title">Stories</h2>
    <div class="list" id="side-list"></div>
  </aside>
  <section class="stage">
    <div class="stage-head">
      <h2 id="focus-title">Loading…</h2>
      <p id="focus-summary"></p>
    </div>
    <div id="board" class="active"></div>
    <div class="inspector" id="inspector">
      <button class="close" id="ins-close" type="button" aria-label="Close">×</button>
      <h3 id="ins-title"></h3>
      <p id="ins-body"></p>
      <div class="meta" id="ins-meta"></div>
    </div>
  </section>
</main>
<script>
const DATA = __DATA__;
const LAYERS = ['experience', 'interface', 'application', 'data', 'infra'];

let view = 'agents';
let focusId = null;

const sideList = document.getElementById('side-list');
const sideTitle = document.getElementById('side-title');
const board = document.getElementById('board');
const focusTitle = document.getElementById('focus-title');
const focusSummary = document.getElementById('focus-summary');
const inspector = document.getElementById('inspector');

document.getElementById('chip-stats').textContent =
  `${(DATA.nodes||[]).filter(n => n.kind !== 'layer').length} nodes · ${(DATA.agents||[]).length} agents · ${(DATA.journeys||[]).length} journeys · ${(DATA.requests||[]).length} requests`;

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.setAttribute('aria-selected', 'false'));
    btn.setAttribute('aria-selected', 'true');
    view = btn.dataset.view;
    focusId = null;
    render();
  });
});
document.getElementById('btn-top').onclick = () => {
  board.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
};
document.getElementById('ins-close').onclick = () => inspector.classList.remove('open');

function nodeMap() {
  const m = {};
  (DATA.nodes || []).forEach(n => { m[n.id] = n; });
  return m;
}
function agents() {
  return (DATA.agents || []).map(a => ({
    id: a.id,
    name: a.name,
    summary: a.summary || '',
    role: a.role || '',
    level: a.level || 'orchestrator',
    parent_id: a.parent_id || null,
    node_id: a.node_id || null,
    flow: a.flow || [],
    relations: a.relations || [],
    tools: a.tools || [],
  }));
}
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escM(s) {
  return String(s || '').replace(/[\[\]#;{}()<>|"]/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 42);
}
function setMeta(title, summary) {
  focusTitle.textContent = title || '';
  focusSummary.textContent = summary || '';
}
function showInspector(obj) {
  if (!obj) return;
  inspector.classList.add('open');
  document.getElementById('ins-title').textContent = obj.label || obj.name || obj.id;
  document.getElementById('ins-body').textContent = obj.summary || obj.role || 'No summary.';
  document.getElementById('ins-meta').textContent = [
    obj.kind && `kind: ${obj.kind}`,
    obj.level && `level: ${obj.level}`,
    obj.layer && `layer: ${obj.layer}`,
    obj.role && `role: ${obj.role}`,
    obj.source && `source: ${obj.source}`,
    obj.id && `id: ${obj.id}`,
  ].filter(Boolean).join('\n');
}
function bindSide(items) {
  sideList.innerHTML = items.map(it =>
    `<button class="item ${it.id === focusId ? 'active' : ''}" data-id="${esc(it.id)}"><strong>${esc(it.name)}</strong><small>${esc(it.summary || '')}</small></button>`
  ).join('') || `<div class="empty">Nothing here yet.</div>`;
  sideList.querySelectorAll('.item').forEach(btn => {
    btn.addEventListener('click', () => {
      focusId = btn.dataset.id;
      const hit = items.find(i => i.id === focusId);
      if (hit && hit._raw) showInspector(hit._raw);
      render();
    });
  });
}
function useBoard(engine = 'Story map') {
  board.classList.add('active');
  document.getElementById('chip-engine').textContent = engine;
}
function wireClicks(root, selector, lookup) {
  root.querySelectorAll(selector).forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const obj = lookup(el.dataset.id);
      if (obj) showInspector(obj);
    });
  });
}

function renderAgents() {
  useBoard();
  const all = agents();
  const systems = all.filter(a => a.level === 'system');
  const orchs = all.filter(a => a.level === 'orchestrator' || (!a.parent_id && a.level !== 'system' && a.level !== 'subagent'));
  const side = [
    { id: '__fleet__', name: 'Fleet overview', summary: `${all.length} agents · org chart` },
    ...orchs.map(a => ({
      id: a.id,
      name: a.name,
      summary: a.role || a.summary || `${(a.tools || []).length} tools`,
      _raw: a,
    })),
  ];
  if (!focusId) focusId = '__fleet__';
  sideTitle.textContent = 'Agent fleet';
  bindSide(side);

  if (focusId !== '__fleet__') {
    const current = all.find(a => a.id === focusId) || orchs[0];
    setMeta(current.name, [current.role, current.summary].filter(Boolean).join(' — '));
    const kids = all.filter(a => a.parent_id === current.id || (current.flow || []).includes(a.id));
    board.innerHTML = `<div class="fleet">${orchCard(current, kids.length ? kids : [current], true)}</div>`;
    wireAgentClicks();
    return;
  }

  setMeta('Agentic architecture', 'Readable hierarchy: system → orchestrators → subagents → tools. Click any card.');
  const owned = new Set();
  let html = '<div class="fleet">';
  if (systems.length) {
    systems.forEach(sys => {
      html += `<article class="system-card" data-id="${esc(sys.id)}">
        <div class="eyebrow">System agent</div>
        <h3>${esc(sys.name)}</h3>
        <p>${esc(sys.role || sys.summary || '')}</p>
      </article>`;
      const children = orchs.filter(o => o.parent_id === sys.id);
      children.forEach(o => owned.add(o.id));
      if (children.length) {
        html += `<div class="orch-grid">${children.map(o => {
          const kids = all.filter(c => c.parent_id === o.id || (o.flow || []).includes(c.id));
          return orchCard(o, kids);
        }).join('')}</div>`;
      }
    });
  }
  const rest = orchs.filter(o => !owned.has(o.id));
  if (rest.length) {
    html += `<div class="orch-grid">${rest.map(o => {
      const kids = all.filter(c => c.parent_id === o.id || (o.flow || []).includes(c.id));
      return orchCard(o, kids);
    }).join('')}</div>`;
  }
  html += `<div class="legend">
    <span><i style="background:var(--violet)"></i>System</span>
    <span><i style="background:#ff9f6b"></i>Orchestrator</span>
    <span><i style="background:var(--warn)"></i>Subagent</span>
    <span><i style="background:var(--sky)"></i>Tool</span>
  </div></div>`;
  board.innerHTML = html || '<div class="empty">No agents authored. Re-run /okad.</div>';
  wireAgentClicks();
}

function orchCard(o, kids, solo) {
  const subs = (kids || []).filter(k => k.id !== o.id);
  const showSelfTools = !subs.length;
  const rel = (o.relations || []).slice(0, 4).map(r =>
    `<span class="rel">${esc(r.label || r.kind || 'relates')} → ${esc((agents().find(a => a.id === r.target) || {}).name || r.target)}</span>`
  ).join('');
  return `<article class="orch" data-id="${esc(o.id)}" style="${solo ? 'max-width:560px' : ''}">
    <div class="level">${esc(o.level || 'orchestrator')}</div>
    <h4>${esc(o.name)}</h4>
    <p class="role">${esc(o.role || o.summary || '')}</p>
    <div class="subs">${
      subs.length
        ? subs.map(s => `<div class="sub" data-id="${esc(s.id)}">
            <span class="dot"></span>
            <div>
              <div class="name">${esc(s.name)}</div>
              <div class="sum">${esc(s.summary || s.role || '')}</div>
              ${(s.tools || []).length ? `<div class="tools">${s.tools.map(t => `<span class="tool">${esc(t.name)}</span>`).join('')}</div>` : ''}
            </div>
          </div>`).join('')
        : `<div class="sub" data-id="${esc(o.id)}"><span class="dot"></span><div><div class="name">Direct tools</div><div class="sum">No subagents — tools hang on the orchestrator.</div>
            ${(o.tools || []).length ? `<div class="tools">${o.tools.map(t => `<span class="tool">${esc(t.name)}</span>`).join('')}</div>` : ''}
          </div></div>`
    }</div>
    ${showSelfTools && (o.tools || []).length && subs.length ? `<div class="tools" style="margin-top:.65rem">${o.tools.map(t => `<span class="tool">${esc(t.name)}</span>`).join('')}</div>` : ''}
    ${rel ? `<div class="rel-row">${rel}</div>` : ''}
  </article>`;
}

function wireAgentClicks() {
  const map = Object.fromEntries(agents().map(a => [a.id, a]));
  wireClicks(board, '.system-card, .orch, .sub', id => map[id]);
}

function journeySteps(j) {
  return (j.steps || []).map(s => {
    if (typeof s === 'string') return { node_id: s, note: '' };
    return { node_id: s.node_id || s.id, note: s.note || '' };
  }).filter(s => s.node_id);
}

function renderArchitecture() {
  useBoard();
  const nm = nodeMap();
  const journeys = DATA.journeys || [];
  const side = [
    { id: 'arch:overview', name: 'Layer overview', summary: 'Top nodes per layer · no spaghetti' },
    ...journeys.map(j => ({
      id: j.id,
      name: j.name,
      summary: j.summary || `${(j.steps || []).length} steps`,
      _raw: j,
    })),
  ];
  if (!focusId) focusId = journeys[0] ? journeys[0].id : 'arch:overview';
  sideTitle.textContent = 'Stories';
  bindSide(side);

  if (focusId === 'arch:overview') {
    setMeta('Architecture overview', 'Five layers. Highest-signal nodes only — open a journey for the real story path.');
    const deg = {};
    (DATA.edges || []).forEach(e => {
      if (e.kind === 'contains') return;
      deg[e.source] = (deg[e.source] || 0) + 1;
      deg[e.target] = (deg[e.target] || 0) + 1;
    });
    const by = {};
    LAYERS.forEach(l => { by[l] = []; });
    (DATA.nodes || []).filter(n => n.kind !== 'layer').forEach(n => {
      (by[n.layer] ? by[n.layer] : by.application).push(n);
    });
    LAYERS.forEach(l => by[l].sort((a, b) => (deg[b.id] || 0) - (deg[a.id] || 0)));
    board.innerHTML = `<div class="arch">
      <div class="lanes">${LAYERS.map(l => laneHtml(l, by[l].slice(0, 6))).join('')}</div>
      <div class="legend">
        <span><i style="background:var(--experience)"></i>Experience</span>
        <span><i style="background:var(--interface)"></i>Interface</span>
        <span><i style="background:var(--application)"></i>Application</span>
        <span><i style="background:var(--data)"></i>Data</span>
        <span><i style="background:var(--infra)"></i>Infra</span>
      </div>
    </div>`;
    wireNodeClicks(nm);
    return;
  }

  const journey = journeys.find(j => j.id === focusId) || journeys[0];
  if (!journey) {
    setMeta('No journeys', 'Re-run /okad to author journeys.');
    board.innerHTML = '<div class="empty">No journeys yet.</div>';
    return;
  }
  const steps = journeySteps(journey);
  setMeta(journey.name, journey.summary || 'Journey path across layers — then the lane map of only what this story touches.');

  const keep = new Set(steps.map(s => s.node_id));
  (DATA.edges || []).forEach(e => {
    if (e.kind === 'contains') return;
    if (keep.has(e.source) && nm[e.target]) keep.add(e.target);
    if (keep.has(e.target) && nm[e.source]) keep.add(e.source);
  });

  const by = {};
  LAYERS.forEach(l => { by[l] = []; });
  [...keep].forEach(id => {
    const n = nm[id];
    if (!n || n.kind === 'layer') return;
    (by[n.layer] ? by[n.layer] : by.application).push(n);
  });

  const pathHtml = steps.map((s, i) => {
    const n = nm[s.node_id] || { id: s.node_id, label: s.node_id, layer: 'application', kind: 'service' };
    return `<div class="step">
      <div class="step-card" data-id="${esc(n.id)}">
        <div class="step-num">STEP ${String(i + 1).padStart(2, '0')}</div>
        <h4>${esc(n.label || n.id)}</h4>
        <span class="layer-pill ${esc(n.layer || 'application')}">${esc(n.layer || 'application')}</span>
        ${s.note ? `<div class="note">${esc(s.note)}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  board.innerHTML = `<div class="arch">
    <div>
      <div class="legend" style="margin-bottom:.55rem"><span>Story path</span></div>
      <div class="path">${pathHtml}</div>
    </div>
    <div>
      <div class="legend" style="margin-bottom:.55rem"><span>Touched layers</span></div>
      <div class="lanes">${LAYERS.map(l => laneHtml(l, by[l])).join('')}</div>
    </div>
  </div>`;
  wireNodeClicks(nm);
  wireClicks(board, '.step-card', id => nm[id]);
}

function laneHtml(layer, nodes) {
  return `<section class="lane ${layer}">
    <div class="lane-head"><span>${layer}</span><em>${nodes.length}</em></div>
    ${nodes.length
      ? nodes.map(n => `<div class="node ${layer}" data-id="${esc(n.id)}">
          <div class="kind">${esc(n.kind || 'node')}</div>
          <div class="title">${esc(n.label || n.id)}</div>
        </div>`).join('')
      : `<div class="empty" style="padding:.6rem;font-size:.72rem">—</div>`}
  </section>`;
}

function wireNodeClicks(nm) {
  wireClicks(board, '.node', id => nm[id]);
}

function renderData() {
  useBoard();
  const nm = nodeMap();
  const items = (DATA.data_flows || []).map(d => ({
    id: d.id, name: d.name, summary: d.summary || d.shape || '', _raw: d
  }));
  sideTitle.textContent = 'Data flows';
  if (!items.length) {
    bindSide([]);
    setMeta('No data flows', 'Re-run /okad to author data flows.');
    board.innerHTML = '<div class="empty">Nothing authored yet.</div>';
    return;
  }
  if (!focusId || !items.find(i => i.id === focusId)) focusId = items[0].id;
  bindSide(items);
  const current = items.find(i => i.id === focusId)._raw;
  setMeta(current.name, current.summary || current.shape || '');
  const stepIds = [current.origin, ...(current.through || []), current.destination].filter(Boolean);
  const unique = [];
  stepIds.forEach(id => { if (id && !unique.includes(id)) unique.push(id); });
  board.innerHTML = `<div class="pipe">${unique.map((id, i) => {
    const n = nm[id] || { id, label: id, summary: '', layer: 'application' };
    return `<div class="pipe-step">
      <div class="pipe-card" data-id="${esc(id)}">
        <div class="i">0${i + 1}</div>
        <h4>${esc(n.label || id)}</h4>
        <p>${esc(n.summary || n.layer || '')}</p>
      </div>
    </div>`;
  }).join('')}</div>`;
  wireNodeClicks(nm);
}

function renderStoryRail(mode) {
  useBoard(mode === 'journeys' ? 'Journey rail' : 'Request rail');
  const nm = nodeMap();
  let items = [];
  if (mode === 'journeys') {
    sideTitle.textContent = 'User journeys';
    items = (DATA.journeys || []).map(j => ({ id: j.id, name: j.name, summary: j.summary || '', _raw: j }));
  } else {
    sideTitle.textContent = 'Request paths';
    items = (DATA.requests || []).map(r => ({
      id: r.id,
      name: r.name,
      summary: `${r.method || ''} ${r.route || ''}`.trim() || r.summary || '',
      _raw: r,
    }));
  }
  if (!items.length) {
    bindSide([]);
    setMeta(`No ${mode}`, 'Re-run /okad to author this view.');
    board.innerHTML = `<div class="empty">Nothing authored yet.</div>`;
    return;
  }
  if (!focusId || !items.find(i => i.id === focusId)) focusId = items[0].id;
  bindSide(items);
  const current = items.find(i => i.id === focusId)._raw;
  setMeta(
    current.name,
    current.summary || `${current.method || ''} ${current.route || ''}`.trim()
  );

  let steps = [];
  if (mode === 'journeys') {
    steps = journeySteps(current).map(s => ({
      id: s.node_id,
      note: s.note || '',
    }));
  } else {
    steps = (current.steps || []).map(id => ({ id, note: '' }));
  }
  const unique = [];
  steps.forEach(s => {
    if (s.id && !unique.find(u => u.id === s.id)) unique.push(s);
  });

  const badges = [];
  if (current.method) badges.push(`<span class="badge ok">${esc(current.method)}</span>`);
  if (current.route) badges.push(`<span class="badge">${esc(current.route)}</span>`);
  if (current.status && current.status.length) {
    badges.push(`<span class="badge ok">${esc(current.status.join(' / '))}</span>`);
  }
  badges.push(`<span class="badge">${unique.length} steps</span>`);

  board.innerHTML = `<div class="rail">
    <div class="rail-meta">${badges.join('')}</div>
    ${unique.map((s, i) => {
      const n = nm[s.id] || { id: s.id, label: s.id, layer: 'application', kind: 'service', summary: '' };
      const next = unique[i + 1];
      const nextLabel = next ? ((nm[next.id] && nm[next.id].label) || next.id) : '';
      return `<div class="rail-step" style="animation-delay:${i * 0.04}s">
        <div class="rail-idx">${String(i + 1).padStart(2,'0')}</div>
        <div class="rail-card" data-id="${esc(n.id)}">
          <div class="top">
            <span class="layer-pill ${esc(n.layer || 'application')}">${esc(n.layer || 'application')}</span>
            <span class="badge">${esc(n.kind || 'node')}</span>
          </div>
          <h4>${esc(n.label || n.id)}</h4>
          <p class="sum">${esc(s.note || n.summary || '')}</p>
          ${next ? `<div class="arrow">↓ then ${esc(nextLabel)}</div>` : `<div class="arrow">■ end</div>`}
        </div>
      </div>`;
    }).join('')}
  </div>`;
  wireClicks(board, '.rail-card', id => nm[id]);
}

function render() {
  inspector.classList.remove('open');
  if (view === 'agents') return renderAgents();
  if (view === 'architecture') return renderArchitecture();
  if (view === 'data') return renderData();
  if (view === 'journeys') return renderStoryRail('journeys');
  return renderStoryRail('requests');
}

render();
</script>
</body>
</html>
