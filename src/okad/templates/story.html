<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OKAD — __SYSTEM_NAME__</title>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg: #090c0b;
    --bg-elev: #101614;
    --bg-card: #171f1b;
    --ink: #eef4ef;
    --muted: #8b9a90;
    --line: #2a3530;
    --accent: #3dba8a;
    --accent-soft: color-mix(in srgb, var(--accent) 22%, transparent);
    --font-display: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --font-body: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font-body); }
  body {
    background:
      radial-gradient(900px 480px at 8% -8%, #13241c 0%, transparent 55%),
      radial-gradient(700px 420px at 100% 0%, #181426 0%, transparent 50%),
      var(--bg);
    overflow: hidden;
  }
  header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 0.7rem 1.1rem;
    align-items: center;
    padding: 0.8rem 1.05rem;
    border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(8px);
    z-index: 5;
  }
  .brand-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: 0.5rem 0.8rem; }
  .brand {
    font-family: var(--font-display);
    font-size: clamp(1.3rem, 2.3vw, 1.8rem);
    letter-spacing: 0.04em;
    margin: 0;
    line-height: 1;
  }
  .brand span { color: var(--accent); }
  .chips { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .chip {
    font-family: var(--font-mono);
    font-size: 0.66rem;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 0.16rem 0.42rem;
    border-radius: 999px;
  }
  .chip.accent { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
  .tagline {
    color: var(--muted);
    margin: 0.3rem 0 0;
    max-width: 72ch;
    font-size: 0.8rem;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .tabs { display: flex; gap: 0.28rem; flex-wrap: wrap; justify-content: flex-end; }
  .tab {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 0.38rem 0.65rem;
    font: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    border-radius: 4px;
  }
  .tab[aria-selected="true"] {
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
  }
  .toolbar {
    grid-column: 1 / -1;
    display: flex;
    gap: 0.35rem;
    align-items: center;
    justify-content: flex-end;
  }
  .toolbtn {
    background: var(--bg-elev);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 0.28rem 0.55rem;
    font: inherit;
    font-size: 0.74rem;
    cursor: pointer;
    border-radius: 4px;
  }
  .toolbtn:hover { border-color: var(--accent); }
  .hint { color: var(--muted); font-size: 0.7rem; margin-left: 0.3rem; }
  main {
    display: grid;
    grid-template-columns: minmax(220px, 280px) 1fr;
    height: calc(100vh - 112px);
  }
  aside {
    border-right: 1px solid var(--line);
    padding: 0.85rem;
    overflow: auto;
    background: color-mix(in srgb, var(--bg-elev) 94%, transparent);
  }
  aside h2 {
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin: 0 0 0.6rem;
  }
  .list { display: flex; flex-direction: column; gap: 0.32rem; }
  .item {
    text-align: left;
    width: 100%;
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink);
    padding: 0.5rem 0.55rem;
    cursor: pointer;
    font: inherit;
    border-radius: 6px;
  }
  .item:hover, .item.active { border-color: var(--line); background: var(--bg-card); }
  .item.active {
    border-color: color-mix(in srgb, var(--accent) 50%, var(--line));
    box-shadow: 0 0 0 1px var(--accent-soft);
  }
  .item small { display: block; color: var(--muted); margin-top: 0.15rem; font-size: 0.7rem; line-height: 1.35; }
  .stage {
    position: relative;
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 0;
  }
  .stage-head {
    padding: 0.75rem 1rem 0.35rem;
    border-bottom: 1px solid var(--line);
  }
  .stage-head h2 {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 1.25rem;
  }
  .stage-head p {
    margin: 0.3rem 0 0;
    color: var(--muted);
    font-size: 0.86rem;
    line-height: 1.4;
    max-width: 80ch;
  }
  #cy, #mmd {
    width: 100%;
    height: 100%;
    min-height: 0;
  }
  #mmd {
    overflow: auto;
    padding: 1rem;
    display: none;
  }
  #mmd.active { display: block; }
  #cy.active { display: block; }
  #cy {
    display: none;
    background:
      linear-gradient(to right, color-mix(in srgb, var(--line) 35%, transparent) 1px, transparent 1px) 0 0 / 48px 48px,
      linear-gradient(to bottom, color-mix(in srgb, var(--line) 35%, transparent) 1px, transparent 1px) 0 0 / 48px 48px,
      radial-gradient(720px 380px at 50% 0%, #12201a 0%, transparent 70%);
  }
  #mmd svg { max-width: 100%; height: auto; }
  .empty { padding: 2rem; color: var(--muted); }
  .inspector {
    position: absolute; right: 0.85rem; top: 4.2rem; width: min(340px, calc(100% - 1.7rem));
    background: color-mix(in srgb, var(--bg-elev) 96%, transparent);
    border: 1px solid var(--line);
    padding: 0.85rem;
    display: none;
    border-radius: 8px;
    backdrop-filter: blur(10px);
    z-index: 4;
    max-height: calc(100% - 5rem);
    overflow: auto;
  }
  .inspector.open { display: block; }
  .inspector h3 { margin: 0 0 0.3rem; font-family: var(--font-display); font-weight: 500; }
  .inspector p { margin: 0; color: var(--muted); font-size: 0.85rem; line-height: 1.45; }
  .inspector .meta { margin-top: 0.65rem; font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted); white-space: pre-wrap; }
  .inspector .close {
    position: absolute; top: 0.4rem; right: 0.5rem;
    background: transparent; border: 0; color: var(--muted); cursor: pointer; font-size: 1rem;
  }
  @media (max-width: 900px) {
    header { grid-template-columns: 1fr; }
    main { grid-template-columns: 1fr; grid-template-rows: minmax(130px, 26vh) 1fr; height: calc(100vh - 150px); }
    aside { border-right: 0; border-bottom: 1px solid var(--line); }
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="brand-row">
      <h1 class="brand">OKAD <span>__SYSTEM_NAME__</span></h1>
      <div class="chips">
        <span class="chip accent">okad __OKAD_VERSION__</span>
        <span class="chip">story v__STORY_VERSION__</span>
        <span class="chip" id="chip-engine">Cytoscape · Mermaid</span>
        <span class="chip" id="chip-stats"></span>
      </div>
    </div>
    <p class="tagline">__SUMMARY__</p>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab" data-view="agents" aria-selected="true">Agents &amp; tools</button>
    <button class="tab" data-view="architecture">Architecture</button>
    <button class="tab" data-view="journeys">Journeys</button>
    <button class="tab" data-view="requests">Requests</button>
    <button class="tab" data-view="data">Data flow</button>
  </div>
  <div class="toolbar">
    <button class="toolbtn" id="btn-fit" type="button">Fit</button>
    <button class="toolbtn" id="btn-png" type="button">Export PNG</button>
    <span class="hint" id="engine-hint">Agents/Architecture/Data → Cytoscape graph · Journeys/Requests → Mermaid sequence</span>
  </div>
</header>
<main>
  <aside>
    <h2 id="side-title">Stories</h2>
    <div class="list" id="side-list"></div>
  </aside>
  <section class="stage">
    <div class="stage-head">
      <h2 id="focus-title">Loading…</h2>
      <p id="focus-summary"></p>
    </div>
    <div id="cy" class="active"></div>
    <div id="mmd"></div>
    <div class="inspector" id="inspector">
      <button class="close" id="ins-close" type="button" aria-label="Close">×</button>
      <h3 id="ins-title"></h3>
      <p id="ins-body"></p>
      <div class="meta" id="ins-meta"></div>
    </div>
  </section>
</main>
<script>
const DATA = __DATA__;
const LAYER_ORDER = ['experience','interface','application','data','infra'];
const COLORS = {
  experience: '#6eb8ff',
  interface: '#3dba8a',
  application: '#e2b15c',
  data: '#e87a6b',
  infra: '#c49bff',
  system: '#c49bff',
  orch: '#ff9f6b',
  sub: '#e2b15c',
  tool: '#9ad7ff',
};

let view = 'agents';
let focusId = null;
let cy = null;

const sideList = document.getElementById('side-list');
const sideTitle = document.getElementById('side-title');
const cyEl = document.getElementById('cy');
const mmdEl = document.getElementById('mmd');
const focusTitle = document.getElementById('focus-title');
const focusSummary = document.getElementById('focus-summary');
const inspector = document.getElementById('inspector');

document.getElementById('chip-stats').textContent =
  `${(DATA.nodes||[]).filter(n => n.kind !== 'layer').length} nodes · ${(DATA.agents||[]).length} agents · ${(DATA.journeys||[]).length} journeys · ${(DATA.requests||[]).length} requests`;

if (typeof cytoscapeDagre !== 'undefined') {
  cytoscape.use(cytoscapeDagre);
} else if (typeof window['cytoscape-dagre'] !== 'undefined') {
  cytoscape.use(window['cytoscape-dagre']);
}

mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  securityLevel: 'loose',
  fontFamily: 'IBM Plex Sans, Segoe UI, sans-serif',
  themeVariables: {
    darkMode: true,
    background: '#101614',
    primaryColor: '#1a2420',
    primaryTextColor: '#eef4ef',
    primaryBorderColor: '#3dba8a',
    lineColor: '#8a9a90',
    actorBkg: '#1a2420',
    actorBorder: '#3dba8a',
    actorTextColor: '#eef4ef',
    signalColor: '#c9d4cc',
    signalTextColor: '#eef4ef',
  },
  sequence: { mirrorActors: false, messageMargin: 40, actorMargin: 56, useMaxWidth: true },
});

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.setAttribute('aria-selected', 'false'));
    btn.setAttribute('aria-selected', 'true');
    view = btn.dataset.view;
    focusId = null;
    render();
  });
});
document.getElementById('btn-fit').onclick = () => { if (cy) cy.fit(undefined, 48); };
document.getElementById('btn-png').onclick = () => {
  if (!cy) return;
  const png = cy.png({ full: true, scale: 2, bg: '#090c0b' });
  const a = document.createElement('a');
  a.href = png;
  a.download = `okad-${view}.png`;
  a.click();
};
document.getElementById('ins-close').onclick = () => inspector.classList.remove('open');

function nodeMap() {
  const m = {};
  (DATA.nodes || []).forEach(n => { m[n.id] = n; });
  return m;
}

function agents() {
  return (DATA.agents || []).map(a => ({
    id: a.id,
    name: a.name,
    summary: a.summary || '',
    role: a.role || '',
    level: a.level || 'orchestrator',
    parent_id: a.parent_id || null,
    node_id: a.node_id || null,
    flow: a.flow || [],
    relations: a.relations || [],
    tools: a.tools || [],
  }));
}

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escM(s) {
  return String(s || '').replace(/[\[\]#;{}()<>|"]/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 42);
}
function setMeta(title, summary) {
  focusTitle.textContent = title || '';
  focusSummary.textContent = summary || '';
}
function showInspector(obj) {
  if (!obj) return;
  inspector.classList.add('open');
  document.getElementById('ins-title').textContent = obj.label || obj.name || obj.id;
  document.getElementById('ins-body').textContent = obj.summary || obj.role || 'No summary.';
  document.getElementById('ins-meta').textContent = [
    obj.kind && `kind: ${obj.kind}`,
    obj.level && `level: ${obj.level}`,
    obj.layer && `layer: ${obj.layer}`,
    obj.role && `role: ${obj.role}`,
    obj.source && `source: ${obj.source}`,
    obj.id && `id: ${obj.id}`,
  ].filter(Boolean).join('\n');
}
function bindSide(items) {
  sideList.innerHTML = items.map(it =>
    `<button class="item ${it.id === focusId ? 'active' : ''}" data-id="${esc(it.id)}"><strong>${esc(it.name)}</strong><small>${esc(it.summary || '')}</small></button>`
  ).join('') || `<div class="empty">Nothing here yet.</div>`;
  sideList.querySelectorAll('.item').forEach(btn => {
    btn.addEventListener('click', () => {
      focusId = btn.dataset.id;
      const hit = items.find(i => i.id === focusId);
      if (hit && hit._raw) showInspector(hit._raw);
      render();
    });
  });
}

function useGraph() {
  cyEl.classList.add('active');
  mmdEl.classList.remove('active');
  mmdEl.innerHTML = '';
  document.getElementById('chip-engine').textContent = 'Cytoscape · dagre';
}
function useMermaid() {
  cyEl.classList.remove('active');
  mmdEl.classList.add('active');
  if (cy) { cy.destroy(); cy = null; }
  document.getElementById('chip-engine').textContent = 'Mermaid sequence';
}

function cyStyle() {
  return [
    {
      selector: 'node',
      style: {
        'shape': 'round-rectangle',
        'background-color': '#151c19',
        'background-opacity': 1,
        'border-width': 2,
        'border-color': '#3dba8a',
        'label': 'data(label)',
        'color': '#eef4ef',
        'text-valign': 'center',
        'text-halign': 'center',
        'text-wrap': 'wrap',
        'text-max-width': 118,
        'font-size': 12,
        'font-family': 'IBM Plex Sans, Segoe UI, sans-serif',
        'font-weight': 600,
        'width': 132,
        'height': 56,
        'padding': '10px',
        'overlay-padding': 4,
        'z-index': 10,
      }
    },
    {
      selector: 'node.layer',
      style: {
        'shape': 'round-rectangle',
        'background-opacity': 0.12,
        'background-color': '#1a2620',
        'border-width': 1.5,
        'border-style': 'dashed',
        'border-color': '#3d4a42',
        'padding': 28,
        'font-size': 11,
        'font-weight': 700,
        'color': '#8b9a90',
        'text-valign': 'top',
        'text-halign': 'center',
        'text-margin-y': 8,
        'text-transform': 'uppercase',
        'letter-spacing': 1.2,
        'z-index': 1,
      }
    },
    {
      selector: 'node.orch-box',
      style: {
        'shape': 'round-rectangle',
        'background-opacity': 0.14,
        'background-color': '#241a14',
        'border-width': 1.5,
        'border-color': '#ff9f6b',
        'padding': 22,
        'font-size': 12,
        'font-weight': 700,
        'color': '#ffc29a',
        'text-valign': 'top',
        'text-margin-y': 6,
        'z-index': 2,
      }
    },
    {
      selector: 'node[kind = "system"]',
      style: {
        'border-color': COLORS.system,
        'background-color': '#1a1524',
        'width': 160,
        'height': 64,
        'font-size': 13,
      }
    },
    {
      selector: 'node[kind = "orch"]',
      style: {
        'border-color': COLORS.orch,
        'background-color': '#241a14',
        'width': 148,
        'height': 58,
      }
    },
    {
      selector: 'node[kind = "sub"]',
      style: {
        'border-color': COLORS.sub,
        'background-color': '#1f1a12',
        'width': 128,
        'height': 50,
        'font-size': 11,
      }
    },
    {
      selector: 'node[kind = "tool"]',
      style: {
        'shape': 'round-rectangle',
        'border-color': COLORS.tool,
        'background-color': '#121820',
        'width': 112,
        'height': 42,
        'font-size': 10,
        'font-weight': 500,
      }
    },
    {
      selector: 'node[kind = "screen"]',
      style: { 'border-color': COLORS.experience, 'background-color': '#121820' }
    },
    {
      selector: 'node[kind = "route"]',
      style: { 'border-color': COLORS.interface, 'background-color': '#121a17' }
    },
    {
      selector: 'node[kind = "service"]',
      style: { 'border-color': COLORS.application, 'background-color': '#1a1710' }
    },
    {
      selector: 'node[kind = "store"]',
      style: { 'border-color': COLORS.data, 'background-color': '#1a1212' }
    },
    {
      selector: 'node[kind = "infra"]',
      style: { 'border-color': COLORS.infra, 'background-color': '#16121c' }
    },
    {
      selector: 'node.layer[layer = "experience"]',
      style: { 'border-color': COLORS.experience, 'background-color': '#101820' }
    },
    {
      selector: 'node.layer[layer = "interface"]',
      style: { 'border-color': COLORS.interface, 'background-color': '#101816' }
    },
    {
      selector: 'node.layer[layer = "application"]',
      style: { 'border-color': COLORS.application, 'background-color': '#181410' }
    },
    {
      selector: 'node.layer[layer = "data"]',
      style: { 'border-color': COLORS.data, 'background-color': '#181010' }
    },
    {
      selector: 'node.layer[layer = "infra"]',
      style: { 'border-color': COLORS.infra, 'background-color': '#141018' }
    },
    {
      selector: 'node:selected',
      style: { 'border-width': 3, 'border-color': '#ffffff' }
    },
    {
      selector: 'edge',
      style: {
        'curve-style': 'bezier',
        'target-arrow-shape': 'triangle',
        'target-arrow-color': '#6a7a70',
        'line-color': '#4a5a50',
        'width': 2,
        'arrow-scale': 1,
        'label': 'data(label)',
        'font-size': 9,
        'color': '#9aaba0',
        'text-background-color': '#0d1210',
        'text-background-opacity': 0.9,
        'text-background-padding': 2,
        'text-rotation': 'autorotate',
        'opacity': 0.85,
      }
    },
    {
      selector: 'edge.taxi',
      style: {
        'curve-style': 'taxi',
        'taxi-direction': 'horizontal',
        'taxi-turn': '35%',
        'taxi-turn-min-distance': 28,
      }
    },
    {
      selector: 'edge.hierarchy',
      style: {
        'curve-style': 'taxi',
        'taxi-direction': 'downward',
        'line-color': '#7a6a90',
        'target-arrow-color': '#7a6a90',
        'width': 1.6,
        'opacity': 0.7,
      }
    },
    {
      selector: 'edge[kind = "owns"]',
      style: { 'line-color': '#c49bff', 'target-arrow-color': '#c49bff' }
    },
    {
      selector: 'edge[kind = "uses"]',
      style: { 'line-color': '#9ad7ff', 'target-arrow-color': '#9ad7ff' }
    },
    {
      selector: 'edge[kind = "feeds"], edge[kind = "invokes"], edge[kind = "relates"], edge[kind = "calls"], edge[kind = "triggers"]',
      style: { 'line-color': '#ff9f6b', 'target-arrow-color': '#ff9f6b' }
    },
    {
      selector: 'edge[kind = "reads"], edge[kind = "writes"]',
      style: { 'line-color': '#e87a6b', 'target-arrow-color': '#e87a6b' }
    },
  ];
}

function mountCy(elements, rankDir = 'TB') {
  useGraph();
  if (cy) { cy.destroy(); cy = null; }
  const layout = {
    name: 'dagre',
    rankDir,
    nodeSep: 36,
    edgeSep: 24,
    rankSep: 72,
    padding: 48,
    animate: false,
    fit: true,
  };
  try {
    cy = cytoscape({
      container: cyEl,
      elements,
      style: cyStyle(),
      minZoom: 0.15,
      maxZoom: 2.6,
      wheelSensitivity: 0.2,
      layout,
    });
  } catch (err) {
    cy = cytoscape({
      container: cyEl,
      elements,
      style: cyStyle(),
      minZoom: 0.15,
      maxZoom: 2.6,
      wheelSensitivity: 0.2,
      layout: { name: 'breadthfirst', directed: true, padding: 48, spacingFactor: 1.2, animate: false, fit: true },
    });
  }
  wireCy();
}

function mountCyPreset(elements) {
  useGraph();
  if (cy) { cy.destroy(); cy = null; }
  cy = cytoscape({
    container: cyEl,
    elements,
    style: cyStyle(),
    minZoom: 0.15,
    maxZoom: 2.6,
    wheelSensitivity: 0.2,
    layout: { name: 'preset', fit: true, padding: 56 },
  });
  cy.edges().addClass('taxi');
  wireCy();
}

function wireCy() {
  cy.on('tap', 'node', (evt) => {
    const n = evt.target;
    if (n.hasClass('layer') || n.hasClass('orch-box')) return;
    const d = n.data();
    showInspector({
      id: d.id,
      name: d.fullLabel || d.label,
      label: d.fullLabel || d.label,
      summary: d.summary || '',
      role: d.role || '',
      kind: d.kind,
      level: d.level,
      layer: d.layer,
      source: d.sourcePath || null,
    });
  });
  cy.on('tap', (evt) => {
    if (evt.target === cy) inspector.classList.remove('open');
  });
  requestAnimationFrame(() => cy && cy.fit(undefined, 56));
}

function shortLabel(s, n = 22) {
  const t = String(s || '').trim();
  return t.length <= n ? t : t.slice(0, n - 1) + '…';
}

function degreeMap() {
  const deg = {};
  (DATA.edges || []).forEach(e => {
    if (e.kind === 'contains') return;
    deg[e.source] = (deg[e.source] || 0) + 1;
    deg[e.target] = (deg[e.target] || 0) + 1;
  });
  return deg;
}

function kindOfNode(n) {
  if (n.kind === 'screen' || n.kind === 'action') return 'screen';
  if (n.kind === 'route' || n.kind === 'handler') return 'route';
  if (n.kind === 'store' || n.kind === 'entity') return 'store';
  if (n.kind === 'external' || n.layer === 'infra') return 'infra';
  return 'service';
}

function renderAgentsGraph() {
  const all = agents();
  const roots = all.filter(a => !a.parent_id || a.level === 'system' || a.level === 'orchestrator');
  const top = all.filter(a => a.level === 'system' || a.level === 'orchestrator' || !a.parent_id);
  sideTitle.textContent = 'Agent fleet';
  const side = [
    { id: '__fleet__', name: 'Fleet overview', summary: `${all.length} agents · hierarchy map` },
    ...top.map(a => ({
      id: a.id,
      name: a.name,
      summary: a.role || a.summary || `${(a.flow||[]).length} steps · ${(a.tools||[]).length} tools`,
      _raw: a,
    })),
  ];
  if (!focusId) focusId = '__fleet__';
  bindSide(side);

  const elements = [];
  const seen = new Set();
  const addNode = (a, kind, parent) => {
    if (seen.has(a.id)) return;
    seen.add(a.id);
    const el = {
      data: {
        id: a.id,
        label: shortLabel(a.name, kind === 'tool' ? 16 : 20),
        fullLabel: a.name,
        summary: a.summary || '',
        role: a.role || '',
        kind,
        level: a.level || kind,
        sourcePath: a.node_id || a.source || null,
      }
    };
    if (parent) el.data.parent = parent;
    elements.push(el);
  };
  const addEdge = (src, tgt, label, kind, cls) => {
    elements.push({
      data: {
        id: `${src}->${tgt}:${kind}:${label || ''}`,
        source: src,
        target: tgt,
        label: label || '',
        kind: kind || 'relates',
      },
      classes: cls || '',
    });
  };

  if (focusId === '__fleet__') {
    setMeta('Agentic architecture', 'System → orchestrators → subagents. Compound groups, not spaghetti.');
    // system roots as top nodes; orchestrators as compound boxes with kids inside
    const systems = all.filter(a => a.level === 'system');
    const orchs = all.filter(a => a.level === 'orchestrator');
    systems.forEach(s => addNode(s, 'system'));
    orchs.forEach(o => {
      // compound shell
      elements.push({
        data: {
          id: `box:${o.id}`,
          label: shortLabel(o.name, 24),
          fullLabel: o.name,
          summary: o.role || o.summary || '',
          kind: 'orch',
          level: 'orchestrator',
        },
        classes: 'orch-box',
      });
      if (o.parent_id && systems.some(s => s.id === o.parent_id)) {
        addEdge(o.parent_id, `box:${o.id}`, 'owns', 'owns', 'hierarchy');
      }
      const kids = all.filter(c => c.parent_id === o.id || (o.flow || []).includes(c.id));
      if (!kids.length) {
        // show orch itself as a leaf inside its box
        addNode(o, 'orch', `box:${o.id}`);
      } else {
        kids.forEach(c => addNode(c, 'sub', `box:${o.id}`));
      }
      (o.relations || []).forEach(r => {
        const tgt = orchs.find(x => x.id === r.target);
        if (tgt) addEdge(`box:${o.id}`, `box:${tgt.id}`, r.label || r.kind || 'relates', r.kind || 'relates');
      });
    });
    // orphan orchestrators / baby-ask style without system parent already handled
    mountCy(elements, 'TB');
    return;
  }

  const current = all.find(a => a.id === focusId) || top[0];
  setMeta(current.name, [current.role, current.summary].filter(Boolean).join(' — '));
  addNode(current, current.level === 'system' ? 'system' : 'orch');
  const kids = all.filter(a => a.parent_id === current.id || (current.flow || []).includes(a.id));
  kids.forEach((c, i) => {
    addNode(c, 'sub');
    addEdge(current.id, c.id, i === 0 ? 'runs' : 'then', 'invokes', 'hierarchy');
    if (i > 0) addEdge(kids[i - 1].id, c.id, '→', 'invokes');
    (c.tools || []).forEach(t => {
      const tid = `${c.id}::${t.id}`;
      addNode({ id: tid, name: t.name, summary: t.summary || '', source: t.source }, 'tool');
      addEdge(c.id, tid, 'tool', 'uses');
    });
  });
  (current.tools || []).forEach(t => {
    addNode({ id: t.id, name: t.name, summary: t.summary || '', source: t.source }, 'tool');
    addEdge(current.id, t.id, 'uses', 'uses');
  });
  (current.relations || []).forEach(r => {
    const target = all.find(a => a.id === r.target);
    if (!target) return;
    addNode(target, target.level === 'system' ? 'system' : 'orch');
    addEdge(current.id, target.id, r.label || r.kind || 'relates', r.kind || 'relates');
  });
  mountCy(elements, 'LR');
}

function renderArchitectureGraph() {
  const nm = nodeMap();
  const nodes = (DATA.nodes || []).filter(n => n.kind !== 'layer');
  const by = {};
  LAYER_ORDER.forEach(l => { by[l] = []; });
  nodes.forEach(n => { (by[n.layer] ? by[n.layer] : by.application).push(n); });
  const deg = degreeMap();

  // Prefer connected, high-degree nodes — orphan UI chrome is what made it look like trash
  LAYER_ORDER.forEach(l => {
    by[l].sort((a, b) => (deg[b.id] || 0) - (deg[a.id] || 0) || String(a.label).localeCompare(String(b.label)));
  });

  sideTitle.textContent = 'Layers';
  const side = [
    { id: 'layer:all', name: 'System map', summary: `${nodes.length} nodes · layered swimlanes` },
    ...LAYER_ORDER.map(l => ({ id: `layer:${l}`, name: l, summary: `${by[l].length} nodes` })),
  ];
  if (!focusId) focusId = 'layer:all';
  bindSide(side);

  const keep = new Set();
  const perLayer = focusId === 'layer:all' ? 5 : 12;
  if (focusId === 'layer:all') {
    LAYER_ORDER.forEach(l => {
      const picks = by[l].filter(n => (deg[n.id] || 0) > 0).slice(0, perLayer);
      const fill = picks.length ? picks : by[l].slice(0, Math.min(3, perLayer));
      fill.forEach(n => keep.add(n.id));
    });
    setMeta('Architecture', 'Five swimlanes. Only real call edges between neighboring layers.');
  } else {
    const layer = focusId.split(':')[1];
    by[layer].slice(0, perLayer).forEach(n => keep.add(n.id));
    (DATA.edges || []).forEach(e => {
      if (e.kind === 'contains') return;
      if (keep.has(e.source) && nm[e.target]) keep.add(e.target);
      if (keep.has(e.target) && nm[e.source]) keep.add(e.source);
    });
    setMeta(`${layer} layer`, (DATA.layers || []).find(x => x.id === layer)?.blurb || '');
  }

  const colW = 220;
  const rowH = 78;
  const originX = 40;
  const originY = 56;
  const indexes = { experience: 0, interface: 0, application: 0, data: 0, infra: 0 };
  const layerIndex = { experience: 0, interface: 1, application: 2, data: 3, infra: 4 };
  const elements = [];

  // compound swimlanes
  LAYER_ORDER.forEach((l, i) => {
    elements.push({
      group: 'nodes',
      data: {
        id: `layer:${l}`,
        label: l,
        fullLabel: l,
        kind: 'service',
        layer: l,
      },
      classes: 'layer',
      grabbable: false,
      selectable: false,
    });
  });

  [...keep].forEach(id => {
    const n = nm[id];
    if (!n) return;
    const layer = by[n.layer] ? n.layer : 'application';
    const idx = indexes[layer]++;
    elements.push({
      group: 'nodes',
      data: {
        id: n.id,
        parent: `layer:${layer}`,
        label: shortLabel(n.label, 20),
        fullLabel: n.label,
        summary: n.summary || '',
        kind: kindOfNode(n),
        layer,
        sourcePath: n.source || null,
      },
      position: {
        x: originX + layerIndex[layer] * colW + 110,
        y: originY + idx * rowH + 40,
      },
    });
  });

  // Only meaningful edges; adjacent layers; hard cap
  const edgeBudget = focusId === 'layer:all' ? 22 : 28;
  (DATA.edges || [])
    .filter(e => e.kind !== 'contains' && keep.has(e.source) && keep.has(e.target))
    .filter(e => {
      const a = nm[e.source]; const b = nm[e.target];
      if (!a || !b) return false;
      return Math.abs((layerIndex[a.layer] || 2) - (layerIndex[b.layer] || 2)) <= 1;
    })
    .sort((a, b) => {
      const score = (e) => (deg[e.source] || 0) + (deg[e.target] || 0);
      return score(b) - score(a);
    })
    .slice(0, edgeBudget)
    .forEach(e => {
      elements.push({
        group: 'edges',
        data: {
          id: e.id || `${e.source}->${e.target}`,
          source: e.source,
          target: e.target,
          label: shortLabel(e.label || e.kind || '', 14),
          kind: e.kind || 'relates',
        },
        classes: 'taxi',
      });
    });

  mountCyPreset(elements);
}

function renderDataGraph() {
  const nm = nodeMap();
  const items = (DATA.data_flows || []).map(d => ({
    id: d.id, name: d.name, summary: d.summary || d.shape || '', _raw: d
  }));
  sideTitle.textContent = 'Data flows';
  if (!items.length) {
    bindSide([]);
    setMeta('No data flows', 'Re-run /okad to author data flows.');
    useGraph();
    return;
  }
  if (!focusId || !items.find(i => i.id === focusId)) focusId = items[0].id;
  bindSide(items);
  const current = items.find(i => i.id === focusId)._raw;
  setMeta(current.name, current.summary || current.shape || '');
  const stepIds = [current.origin, ...(current.through || []), current.destination].filter(Boolean);
  const unique = [];
  stepIds.forEach(id => { if (id && !unique.includes(id)) unique.push(id); });
  const elements = [];
  unique.forEach(id => {
    const n = nm[id] || { id, label: id, kind: 'service', layer: 'application' };
    elements.push({
      data: {
        id,
        label: shortLabel(n.label || id, 16),
        fullLabel: n.label || id,
        summary: n.summary || '',
        kind: n.kind === 'store' || n.kind === 'entity' ? 'store' : (n.layer === 'infra' ? 'infra' : 'service'),
        size: 70,
      }
    });
  });
  for (let i = 0; i < unique.length - 1; i++) {
    elements.push({
      data: {
        id: `e${i}`,
        source: unique[i],
        target: unique[i + 1],
        label: 'flows',
        kind: 'feeds',
      }
    });
  }
  mountCy(elements, 'LR');
}

async function renderMermaidSequence(mode) {
  useMermaid();
  const nm = nodeMap();
  let items = [];
  if (mode === 'journeys') {
    sideTitle.textContent = 'User journeys';
    items = (DATA.journeys || []).map(j => ({ id: j.id, name: j.name, summary: j.summary || '', _raw: j }));
  } else {
    sideTitle.textContent = 'Request paths';
    items = (DATA.requests || []).map(r => ({
      id: r.id,
      name: r.name,
      summary: `${r.method || ''} ${r.route || ''}`.trim() || r.summary || '',
      _raw: r,
    }));
  }
  if (!items.length) {
    bindSide([]);
    setMeta(`No ${mode}`, 'Re-run /okad to author this view.');
    mmdEl.innerHTML = `<div class="empty">Nothing authored yet.</div>`;
    return;
  }
  if (!focusId || !items.find(i => i.id === focusId)) focusId = items[0].id;
  bindSide(items);
  const current = items.find(i => i.id === focusId)._raw;
  setMeta(current.name, current.summary || `${current.method || ''} ${current.route || ''}`.trim());

  let stepIds = [];
  if (mode === 'journeys') stepIds = (current.steps || []).map(s => s.node_id || s);
  else stepIds = current.steps || [];
  const unique = [];
  stepIds.forEach(id => { if (id && !unique.includes(id)) unique.push(id); });

  const lines = ['sequenceDiagram', '  autonumber'];
  unique.forEach((id, i) => {
    const n = nm[id] || { id, label: id };
    lines.push(`  participant N${i} as ${escM(n.label || id)}`);
  });
  for (let i = 0; i < unique.length - 1; i++) {
    const note = (current.steps && current.steps[i] && current.steps[i].note) || (mode === 'requests' ? 'calls' : 'next');
    lines.push(`  N${i}->>N${i + 1}: ${escM(note)}`);
  }
  if (current.status && current.status.length) {
    lines.push(`  Note over N${Math.max(unique.length - 1, 0)}: ${escM(current.status.join(' / '))}`);
  }
  const code = lines.join('\n');
  mmdEl.innerHTML = '<div class="empty">Rendering Mermaid…</div>';
  try {
    const { svg } = await mermaid.render('okad-seq-' + Date.now(), code);
    mmdEl.innerHTML = svg;
  } catch (err) {
    mmdEl.innerHTML = `<pre class="empty">${esc(String(err))}\n\n${esc(code)}</pre>`;
  }
}

async function render() {
  inspector.classList.remove('open');
  if (view === 'agents') return renderAgentsGraph();
  if (view === 'architecture') return renderArchitectureGraph();
  if (view === 'data') return renderDataGraph();
  if (view === 'journeys') return renderMermaidSequence('journeys');
  return renderMermaidSequence('requests');
}

render();
</script>
