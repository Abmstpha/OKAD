<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OKAD — __SYSTEM_NAME__</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg: #0c100e;
    --bg-elev: #151b18;
    --bg-card: #1a2220;
    --ink: #eef4ef;
    --muted: #8b9a90;
    --line: #2c3832;
    --accent: #3dba8a;
    --accent-soft: color-mix(in srgb, var(--accent) 22%, transparent);
    --experience: #6eb8ff;
    --interface: #3dba8a;
    --application: #e2b15c;
    --data: #e87a6b;
    --infra: #c49bff;
    --agent: #ff9f6b;
    --tool: #9ad7ff;
    --font-display: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --font-body: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font-body); }
  body {
    background:
      radial-gradient(900px 480px at 8% -8%, #1a2e26 0%, transparent 55%),
      radial-gradient(700px 420px at 100% 0%, #221a2a 0%, transparent 50%),
      var(--bg);
    overflow: hidden;
  }
  header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 0.75rem 1.25rem;
    align-items: center;
    padding: 0.85rem 1.1rem;
    border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: blur(8px);
    z-index: 5;
  }
  .brand-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: 0.55rem 0.85rem; }
  .brand {
    font-family: var(--font-display);
    font-size: clamp(1.35rem, 2.4vw, 1.85rem);
    letter-spacing: 0.04em;
    line-height: 1;
    margin: 0;
  }
  .brand span { color: var(--accent); }
  .chips { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .chip {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 0.18rem 0.45rem;
    border-radius: 999px;
  }
  .chip.accent { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, var(--line)); }
  .tagline {
    color: var(--muted);
    margin: 0.35rem 0 0;
    max-width: 72ch;
    font-size: 0.82rem;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .tabs { display: flex; gap: 0.3rem; flex-wrap: wrap; justify-content: flex-end; }
  .tab {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 0.4rem 0.7rem;
    font: inherit;
    font-size: 0.82rem;
    cursor: pointer;
    border-radius: 4px;
    transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
  }
  .tab:hover { color: var(--ink); border-color: color-mix(in srgb, var(--accent) 35%, var(--line)); }
  .tab[aria-selected="true"] {
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
  }
  .toolbar {
    display: flex;
    gap: 0.35rem;
    align-items: center;
    justify-content: flex-end;
    grid-column: 1 / -1;
  }
  .toolbtn {
    background: var(--bg-elev);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 0.28rem 0.55rem;
    font: inherit;
    font-size: 0.75rem;
    cursor: pointer;
    border-radius: 4px;
  }
  .toolbtn:hover { border-color: var(--accent); }
  .hint { color: var(--muted); font-size: 0.72rem; margin-left: 0.35rem; }
  main {
    display: grid;
    grid-template-columns: minmax(200px, 260px) 1fr;
    height: calc(100vh - 118px);
  }
  aside {
    border-right: 1px solid var(--line);
    padding: 0.85rem;
    overflow: auto;
    background: color-mix(in srgb, var(--bg-elev) 90%, transparent);
  }
  aside h2 {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    margin: 0 0 0.65rem;
  }
  .list { display: flex; flex-direction: column; gap: 0.35rem; }
  .item {
    text-align: left;
    width: 100%;
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink);
    padding: 0.5rem 0.55rem;
    cursor: pointer;
    font: inherit;
    border-radius: 6px;
    transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
  }
  .item:hover, .item.active {
    border-color: var(--line);
    background: var(--bg-card);
  }
  .item.active { border-color: color-mix(in srgb, var(--accent) 50%, var(--line)); box-shadow: 0 0 0 1px var(--accent-soft); }
  .item small { display: block; color: var(--muted); margin-top: 0.18rem; font-size: 0.72rem; line-height: 1.35; }
  .stage {
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(transparent 23px, color-mix(in srgb, var(--line) 35%, transparent) 24px),
      linear-gradient(90deg, transparent 23px, color-mix(in srgb, var(--line) 35%, transparent) 24px);
    background-size: 24px 24px;
  }
  #canvas {
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
    touch-action: none;
  }
  #canvas.dragging { cursor: grabbing; }
  .layer-label {
    fill: var(--muted);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-family: var(--font-body);
  }
  .node-card {
    cursor: pointer;
  }
  .node-card rect.card {
    stroke-width: 1.5;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.35));
    transition: filter 180ms ease;
  }
  .node-card:hover rect.card {
    filter: drop-shadow(0 0 12px color-mix(in srgb, var(--accent) 55%, transparent));
  }
  .node-card text {
    fill: var(--ink);
    font-size: 12px;
    pointer-events: none;
    font-family: var(--font-body);
  }
  .node-card .sub { fill: var(--muted); font-size: 10px; }
  .edge {
    fill: none;
    stroke-opacity: 0.45;
    stroke-width: 1.5;
    stroke-dasharray: 6 8;
    animation: dashflow 1.8s linear infinite;
  }
  .edge.hot {
    stroke-opacity: 0.95;
    stroke-width: 2.4;
    stroke-dasharray: 4 6;
    animation-duration: 1.1s;
  }
  .edge.dim { stroke-opacity: 0.08; animation: none; }
  .node-card.dim { opacity: 0.22; }
  @keyframes dashflow {
    to { stroke-dashoffset: -28; }
  }
  @keyframes popin {
    from { opacity: 0; transform: scale(0.86); }
    to { opacity: 1; transform: scale(1); }
  }
  .pop {
    transform-box: fill-box;
    transform-origin: center;
    animation: popin 420ms cubic-bezier(.2,.9,.2,1) both;
  }
  .legend {
    position: absolute; left: 0.75rem; bottom: 0.75rem;
    display: flex; gap: 0.65rem; flex-wrap: wrap;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    border: 1px solid var(--line);
    padding: 0.45rem 0.65rem;
    font-size: 0.72rem; color: var(--muted);
    border-radius: 6px;
    max-width: calc(100% - 1.5rem);
  }
  .swatch { width: 0.6rem; height: 0.6rem; display: inline-block; margin-right: 0.28rem; border-radius: 2px; vertical-align: middle; }
  .inspector {
    position: absolute; right: 0.75rem; top: 0.75rem; width: min(340px, calc(100% - 1.5rem));
    background: color-mix(in srgb, var(--bg-elev) 94%, transparent);
    border: 1px solid var(--line);
    padding: 0.9rem;
    display: none;
    border-radius: 8px;
    backdrop-filter: blur(10px);
    max-height: calc(100% - 1.5rem);
    overflow: auto;
  }
  .inspector.open { display: block; }
  .inspector h3 { margin: 0 0 0.35rem; font-family: var(--font-display); font-weight: 500; font-size: 1.1rem; }
  .inspector p { margin: 0; color: var(--muted); font-size: 0.86rem; line-height: 1.45; }
  .inspector .meta { margin-top: 0.7rem; font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); white-space: pre-wrap; }
  .inspector .close {
    position: absolute; top: 0.45rem; right: 0.55rem;
    background: transparent; border: 0; color: var(--muted); cursor: pointer; font-size: 1rem;
  }
  .mermaid-panel {
    position: absolute; left: 0.75rem; right: 0.75rem; bottom: 0.75rem;
    max-height: 38%;
    overflow: auto;
    background: color-mix(in srgb, var(--bg-elev) 94%, transparent);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 0.65rem 0.85rem;
    display: none;
  }
  .mermaid-panel.open { display: block; }
  .mermaid-panel h3 {
    margin: 0 0 0.4rem;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .mermaid { background: transparent; }
  .empty { padding: 2rem; color: var(--muted); }
  @media (max-width: 900px) {
    header { grid-template-columns: 1fr; }
    main { grid-template-columns: 1fr; grid-template-rows: minmax(140px, 28vh) 1fr; height: calc(100vh - 150px); }
    aside { border-right: 0; border-bottom: 1px solid var(--line); }
    .tabs { justify-content: flex-start; }
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="brand-row">
      <h1 class="brand">OKAD <span>__SYSTEM_NAME__</span></h1>
      <div class="chips">
        <span class="chip accent">okad __OKAD_VERSION__</span>
        <span class="chip" id="chip-story">story v__STORY_VERSION__</span>
        <span class="chip" id="chip-stats"></span>
      </div>
    </div>
    <p class="tagline">__SUMMARY__</p>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab" data-view="agents" aria-selected="true">Agents &amp; tools</button>
    <button class="tab" data-view="architecture" aria-selected="false">Architecture</button>
    <button class="tab" data-view="journeys">Journeys</button>
    <button class="tab" data-view="requests">Requests</button>
    <button class="tab" data-view="data">Data flow</button>
  </div>
  <div class="toolbar">
    <button class="toolbtn" id="btn-fit" type="button">Fit</button>
    <button class="toolbtn" id="btn-zin" type="button">Zoom +</button>
    <button class="toolbtn" id="btn-zout" type="button">Zoom −</button>
    <button class="toolbtn" id="btn-mermaid" type="button">Mermaid</button>
    <span class="hint">scroll to zoom · drag to pan</span>
  </div>
</header>
<main>
  <aside>
    <h2 id="side-title">Stories</h2>
    <div class="list" id="side-list"></div>
  </aside>
  <section class="stage">
    <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="legend" id="legend"></div>
    <div class="inspector" id="inspector">
      <button class="close" id="ins-close" type="button" aria-label="Close">×</button>
      <h3 id="ins-title"></h3>
      <p id="ins-body"></p>
      <div class="meta" id="ins-meta"></div>
    </div>
    <div class="mermaid-panel" id="mermaid-panel">
      <h3>Mermaid sequence</h3>
      <pre class="mermaid" id="mermaid-target"></pre>
    </div>
  </section>
</main>
<script>
const DATA = __DATA__;
const OKAD_VERSION = "__OKAD_VERSION__";
const COLORS = {
  experience: '#6eb8ff',
  interface: '#3dba8a',
  application: '#e2b15c',
  data: '#e87a6b',
  infra: '#c49bff',
  agent: '#ff9f6b',
  tool: '#9ad7ff',
};
const LAYER_ORDER = ['experience','interface','application','data','infra'];

let view = 'agents';
let focusId = null;
let showMermaid = false;
let scale = 1;
let panX = 0;
let panY = 0;
let contentW = 1200;
let contentH = 800;
let dragging = false;
let lastX = 0;
let lastY = 0;

const svg = document.getElementById('canvas');
const sideList = document.getElementById('side-list');
const sideTitle = document.getElementById('side-title');
const inspector = document.getElementById('inspector');
const legend = document.getElementById('legend');
const mermaidPanel = document.getElementById('mermaid-panel');
const mermaidTarget = document.getElementById('mermaid-target');

mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  securityLevel: 'loose',
  flowchart: { curve: 'basis' },
  sequence: { mirrorActors: false },
});

document.getElementById('chip-stats').textContent =
  `${(DATA.nodes||[]).filter(n=>n.kind!=='layer').length} nodes · ${(DATA.journeys||[]).length} journeys · ${(DATA.requests||[]).length} requests`;

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.setAttribute('aria-selected', 'false'));
    btn.setAttribute('aria-selected', 'true');
    view = btn.dataset.view;
    focusId = null;
    render();
  });
});

document.getElementById('btn-fit').onclick = () => fitView();
document.getElementById('btn-zin').onclick = () => zoomAt(1.18);
document.getElementById('btn-zout').onclick = () => zoomAt(1/1.18);
document.getElementById('btn-mermaid').onclick = () => {
  showMermaid = !showMermaid;
  mermaidPanel.classList.toggle('open', showMermaid);
  if (showMermaid) updateMermaid();
};
document.getElementById('ins-close').onclick = () => inspector.classList.remove('open');

svg.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
  zoomAt(factor, e.offsetX, e.offsetY);
}, { passive: false });

svg.addEventListener('pointerdown', (e) => {
  if (e.button !== 0) return;
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
  svg.classList.add('dragging');
  svg.setPointerCapture(e.pointerId);
});
svg.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  panX += e.clientX - lastX;
  panY += e.clientY - lastY;
  lastX = e.clientX;
  lastY = e.clientY;
  applyCamera();
});
svg.addEventListener('pointerup', () => {
  dragging = false;
  svg.classList.remove('dragging');
});

function nodeMap() {
  const m = {};
  (DATA.nodes || []).forEach(n => m[n.id] = n);
  return m;
}

function inferAgents() {
  if (Array.isArray(DATA.agents) && DATA.agents.length) {
    return DATA.agents.map(a => ({
      id: a.id,
      name: a.name,
      summary: a.summary || '',
      role: a.role || '',
      level: a.level || 'orchestrator',
      parent_id: a.parent_id || null,
      node_id: a.node_id || null,
      flow: a.flow || [],
      relations: a.relations || [],
      tools: a.tools || [],
    }));
  }
  const nm = nodeMap();
  const agents = [];
  const re = /(agent|langgraph|graph|underwriter|orchestr)/i;
  (DATA.nodes || []).forEach(n => {
    if (n.kind === 'layer') return;
    const blob = `${n.label||''} ${n.summary||''} ${n.kind||''}`;
    if (!re.test(blob) && !(n.meta && n.meta.agent)) return;
    const tools = [];
    (DATA.edges || []).forEach(e => {
      if (e.source !== n.id) return;
      if (!['calls','reads','writes','depends_on'].includes(e.kind)) return;
      const t = nm[e.target];
      if (!t) return;
      tools.push({
        id: t.id,
        name: e.label || t.label,
        summary: t.summary || '',
        source: t.source || null,
      });
    });
    const seen = new Set();
    const uniq = [];
    tools.forEach(t => { if (!seen.has(t.id)) { seen.add(t.id); uniq.push(t); } });
    agents.push({
      id: n.id,
      name: n.label,
      summary: n.summary || '',
      role: n.kind,
      level: 'orchestrator',
      parent_id: null,
      node_id: n.id,
      flow: [],
      relations: [],
      tools: uniq,
    });
  });
  return agents;
}

function agentMap(agents) {
  const m = {};
  agents.forEach(a => m[a.id] = a);
  return m;
}

function wrapText(parent, text, x, y, maxWidth, lineHeight, fill, size, anchor='middle') {
  const words = String(text || '').split(/\s+/).filter(Boolean);
  let line = '';
  let dy = 0;
  const lines = [];
  words.forEach(w => {
    const test = line ? line + ' ' + w : w;
    if (test.length * (size * 0.55) > maxWidth && line) {
      lines.push(line);
      line = w;
    } else line = test;
  });
  if (line) lines.push(line);
  lines.slice(0, 4).forEach((ln, i) => {
    const t = el('text', {
      x, y: y + i * lineHeight, fill, 'font-size': size, 'text-anchor': anchor,
      'font-family': 'IBM Plex Sans, Segoe UI, sans-serif'
    });
    t.textContent = ln;
    parent.appendChild(t);
  });
  return lines.length;
}

function drawBigAgent(parent, p, opts={}) {
  const a = p.agent;
  const w = opts.w || 240;
  const h = opts.h || 150;
  const color = opts.color || (a.level === 'subagent' ? '#e2b15c' : COLORS.agent);
  const g = el('g', {
    class: 'node-card pop',
    transform: `translate(${p.x},${p.y})`,
    style: `animation-delay:${opts.delay||0}ms`
  });
  const glow = el('rect', {
    x: -w/2, y: -h/2, width: w, height: h, rx: 14,
    fill: 'none', stroke: color, opacity: 0.28, 'stroke-dasharray': '5 9'
  });
  glow.style.animation = 'dashflow 2.2s linear infinite';
  const rect = el('rect', {
    class: 'card', x: -w/2, y: -h/2, width: w, height: h, rx: 14,
    fill: '#141b18', stroke: color, 'stroke-width': 2.2
  });
  const badge = el('rect', {
    x: -w/2 + 12, y: -h/2 + 12, width: Math.min(110, (a.level||'agent').length * 8 + 18), height: 18, rx: 9,
    fill: color, opacity: 0.2
  });
  const badgeT = el('text', {
    x: -w/2 + 20, y: -h/2 + 25, fill: color, 'font-size': 10,
    'font-family': 'IBM Plex Mono, monospace', 'letter-spacing': '0.06em'
  });
  badgeT.textContent = (a.level || 'agent').toUpperCase();
  const title = el('text', {
    x: 0, y: -h/2 + 52, 'text-anchor': 'middle', fill: '#eef4ef',
    'font-size': 15, 'font-family': 'Georgia, serif'
  });
  title.textContent = (a.name || '').slice(0, 28);
  g.appendChild(glow); g.appendChild(rect); g.appendChild(badge); g.appendChild(badgeT); g.appendChild(title);
  if (a.role) {
    const role = el('text', {
      x: 0, y: -h/2 + 70, 'text-anchor': 'middle', fill: '#8b9a90', 'font-size': 11
    });
    role.textContent = a.role.slice(0, 36);
    g.appendChild(role);
  }
  wrapText(g, a.summary || 'No description.', 0, -h/2 + 92, w - 28, 13, '#9aab9f', 11);
  const toolN = (a.tools || []).length;
  const childN = (a.flow || []).length;
  const foot = el('text', {
    x: 0, y: h/2 - 14, 'text-anchor': 'middle', fill: color, 'font-size': 11,
    'font-family': 'IBM Plex Mono, monospace'
  });
  foot.textContent = [
    toolN ? `${toolN} tools` : null,
    childN ? `${childN} steps` : null,
  ].filter(Boolean).join(' · ') || 'agent';
  g.appendChild(foot);
  g.addEventListener('click', (ev) => {
    ev.stopPropagation();
    focusId = a.id;
    showInspector({
      id: a.id, label: a.name, kind: a.level || 'agent', layer: 'application',
      summary: [a.role, a.summary].filter(Boolean).join(' — '),
      source: a.node_id || null,
    });
    render();
  });
  parent.appendChild(g);
}

function drawToolPill(parent, p, tool, delay=0) {
  const label = (tool.name || tool.id || '').slice(0, 22);
  const w = Math.max(120, label.length * 7.2 + 24);
  const h = 44;
  const g = el('g', {
    class: 'node-card pop',
    transform: `translate(${p.x},${p.y})`,
    style: `animation-delay:${delay}ms`
  });
  const rect = el('rect', {
    class: 'card', x: -w/2, y: -h/2, width: w, height: h, rx: 10,
    fill: '#121820', stroke: COLORS.tool, 'stroke-width': 1.6
  });
  const t = el('text', { x: 0, y: -2, 'text-anchor': 'middle', fill: '#eef4ef', 'font-size': 11 });
  t.textContent = label;
  const s = el('text', { x: 0, y: 13, 'text-anchor': 'middle', fill: '#8b9a90', 'font-size': 9 });
  s.textContent = 'tool';
  g.appendChild(rect); g.appendChild(t); g.appendChild(s);
  g.addEventListener('click', (ev) => {
    ev.stopPropagation();
    showInspector({
      id: tool.id, label: tool.name, kind: 'tool', layer: 'infra',
      summary: tool.summary || '', source: tool.source || null,
    });
  });
  parent.appendChild(g);
  return { w, h };
}

function renderAgents() {
  sideTitle.textContent = 'Agent fleet';
  const agents = inferAgents();
  const world = worldGroup();
  if (!agents.length) {
    sideList.innerHTML = `<div class="empty">No agents authored. Re-run /okad and fill the <code>agents</code> list (orchestrators, subagents, tools, relations).</div>`;
    const t = el('text', { x: 40, y: 80, fill: '#8a9a90', 'font-size': 16 });
    t.textContent = 'No agentic map yet.';
    world.appendChild(t);
    contentW = 700; contentH = 320;
    return;
  }

  const am = agentMap(agents);
  const roots = agents.filter(a => a.level === 'system' || a.level === 'orchestrator');
  const fallbackRoots = roots.length ? roots : agents.filter(a => !a.parent_id);

  // Sidebar: fleet overview + each orchestrator / system agent
  const sideItems = [
    { id: '__fleet__', name: 'Fleet overview', summary: `${agents.length} agents · hierarchy + tools + relations` },
    ...fallbackRoots.map(a => ({
      id: a.id,
      name: a.name,
      summary: a.role || a.summary || `${(a.flow||[]).length} steps · ${(a.tools||[]).length} tools`,
    })),
  ];
  if (!focusId || (focusId !== '__fleet__' && !am[focusId])) focusId = '__fleet__';
  sideList.innerHTML = sideItems.map(it =>
    `<button class="item ${it.id===focusId?'active':''}" data-id="${esc(it.id)}"><strong>${esc(it.name)}</strong><small>${esc(it.summary)}</small></button>`
  ).join('');
  bindSide();

  if (focusId === '__fleet__') {
    renderAgentFleet(world, agents, fallbackRoots);
  } else {
    const current = am[focusId] || fallbackRoots[0];
    renderAgentDetail(world, agents, current);
  }
}

function renderAgentFleet(world, agents, roots) {
  const title = el('text', { x: 36, y: 42, fill: '#eef4ef', 'font-size': 22, 'font-family': 'Georgia, serif' });
  title.textContent = 'Agentic architecture';
  world.appendChild(title);
  const sub = el('text', { x: 36, y: 66, fill: '#8b9a90', 'font-size': 12 });
  sub.textContent = 'Hierarchy · relations · click an orchestrator to open subagents + tools';
  world.appendChild(sub);

  const systems = roots.filter(a => a.level === 'system');
  const orchs = roots.filter(a => a.level !== 'system');
  const gapX = 280;
  const positions = {};

  // Row 0 — system orchestrators
  systems.forEach((a, i) => {
    const total = Math.max(systems.length, 1);
    const x = 200 + i * gapX + (orchs.length > systems.length ? (orchs.length - systems.length) * gapX / 2 : 0);
    positions[a.id] = { x, y: 190, agent: a };
  });
  // Row 1 — domain orchestrators
  orchs.forEach((a, i) => {
    positions[a.id] = { x: 160 + i * gapX, y: systems.length ? 420 : 230, agent: a };
  });

  contentW = Math.max(1100, 160 + Math.max(orchs.length, systems.length, 1) * gapX + 120);
  contentH = systems.length ? 700 : 560;

  // parent_id hierarchy edges + explicit relations
  roots.forEach(a => {
    if (a.parent_id && positions[a.parent_id] && positions[a.id]) {
      drawLabeledEdge(world, positions[a.parent_id], positions[a.id], 'owns');
    }
    (a.relations || []).forEach(r => {
      if (!positions[a.id] || !positions[r.target]) return;
      drawLabeledEdge(world, positions[a.id], positions[r.target], r.label || r.kind || 'relates');
    });
  });

  Object.values(positions).forEach((p, i) => {
    const color = p.agent.level === 'system' ? '#c49bff' : COLORS.agent;
    drawBigAgent(world, p, { delay: i * 50, w: 250, h: 160, color });
  });

  // Under each orchestrator, preview subagent names
  const previewY = (systems.length ? 420 : 230) + 130;
  orchs.forEach((a) => {
    const kids = agents.filter(c => c.parent_id === a.id || (a.flow || []).includes(c.id));
    const names = kids.length
      ? kids.map(c => c.name.replace(/ Agent$/, '')).slice(0, 5)
      : (a.flow || []).slice(0, 5);
    if (!names.length) return;
    const t = el('text', {
      x: positions[a.id].x, y: previewY + 20, 'text-anchor': 'middle', fill: '#8b9a90', 'font-size': 10
    });
    t.textContent = names.join(' → ');
    world.appendChild(t);
  });
}

function renderAgentDetail(world, agents, current) {
  const title = el('text', { x: 36, y: 40, fill: '#eef4ef', 'font-size': 22, 'font-family': 'Georgia, serif' });
  title.textContent = current.name;
  world.appendChild(title);
  const sub = el('text', { x: 36, y: 62, fill: '#8b9a90', 'font-size': 12 });
  sub.textContent = [current.role, current.summary].filter(Boolean).join(' — ').slice(0, 140);
  world.appendChild(sub);

  // Orchestrator hub on the left
  const hub = { x: 150, y: 280, agent: current };
  drawBigAgent(world, hub, { w: 260, h: 170, delay: 0 });

  // Children: from flow ids or parent_id
  let children = agents.filter(a => a.parent_id === current.id);
  if (!children.length && (current.flow || []).length) {
    const am = agentMap(agents);
    children = current.flow.map(id => am[id] || {
      id: `step:${id}`,
      name: String(id).replace(/_/g, ' '),
      role: 'graph step',
      level: 'subagent',
      summary: `Pipeline step in ${current.name}`,
      tools: [],
      flow: [],
      relations: [],
    });
  }

  const gap = 250;
  const startX = 460;
  const rowY = 200;
  contentW = Math.max(1100, startX + Math.max(children.length, 1) * gap + 80);
  contentH = Math.max(720, 420 + Math.max(...children.map(c => (c.tools || []).length), 1) * 56);

  const childPos = {};
  if (!children.length) {
    // leaf agent — fan tools to the right of hub
    const tools = current.tools || [];
    tools.forEach((t, i) => {
      const tx = 480 + (i % 3) * 180;
      const ty = 160 + Math.floor(i / 3) * 90;
      drawLabeledEdge(world, hub, { x: tx, y: ty }, 'uses');
      drawToolPill(world, { x: tx, y: ty }, t, 80 + i * 25);
    });
    contentW = Math.max(contentW, 480 + 3 * 180);
    return;
  }

  children.forEach((c, i) => {
    const x = startX + i * gap;
    const y = rowY + (i % 2 === 0 ? 0 : 40);
    childPos[c.id] = { x, y, agent: c };
    drawLabeledEdge(world, hub, childPos[c.id], i === 0 ? 'runs' : 'then');
  });
  // sequence edges between children
  for (let i = 0; i < children.length - 1; i++) {
    drawLabeledEdge(world, childPos[children[i].id], childPos[children[i+1].id], '→');
  }
  children.forEach((c, i) => drawBigAgent(world, childPos[c.id], { w: 220, h: 140, delay: 40 + i * 50, color: '#e2b15c' }));

  // Tools under each subagent
  children.forEach((c, i) => {
    const tools = c.tools || [];
    tools.forEach((t, j) => {
      const tx = childPos[c.id].x;
      const ty = childPos[c.id].y + 120 + j * 58;
      drawLabeledEdge(world, childPos[c.id], { x: tx, y: ty }, 'tool');
      drawToolPill(world, { x: tx, y: ty }, t, 100 + i * 20 + j * 15);
    });
  });

  // Outbound relations to other orchestrators
  (current.relations || []).forEach((r, i) => {
    const target = agents.find(a => a.id === r.target);
    if (!target) return;
    const tx = startX + children.length * gap + 40;
    const ty = 120 + i * 170;
    const tp = { x: tx, y: ty, agent: target };
    drawLabeledEdge(world, hub, tp, r.label || r.kind || 'relates');
    drawBigAgent(world, tp, { w: 230, h: 140, delay: 200, color: '#c49bff' });
    contentW = Math.max(contentW, tx + 160);
  });
}

function drawLabeledEdge(parent, a, b, label) {
  const path = el('path', {
    class: 'edge hot',
    d: `M ${a.x} ${a.y} C ${(a.x+b.x)/2} ${a.y}, ${(a.x+b.x)/2} ${b.y}, ${b.x} ${b.y}`,
    stroke: COLORS.agent
  });
  parent.appendChild(path);
  if (label) {
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2 - 8;
    const t = el('text', {
      x: mx, y: my, 'text-anchor': 'middle', fill: '#b7c4ba', 'font-size': 10,
      'font-family': 'IBM Plex Mono, monospace'
    });
    t.textContent = String(label).slice(0, 28);
    parent.appendChild(t);
  }
}

function worldGroup() {
  let g = svg.querySelector('#world');
  if (!g) {
    g = el('g', { id: 'world' });
    svg.appendChild(g);
  }
  return g;
}

function applyCamera() {
  const g = worldGroup();
  g.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
}

function fitView() {
  const vbW = svg.clientWidth || 900;
  const vbH = svg.clientHeight || 600;
  const pad = 36;
  const sx = (vbW - pad * 2) / Math.max(contentW, 1);
  const sy = (vbH - pad * 2) / Math.max(contentH, 1);
  scale = Math.min(sx, sy, 1.35);
  panX = (vbW - contentW * scale) / 2;
  panY = (vbH - contentH * scale) / 2;
  applyCamera();
}

function zoomAt(factor, cx, cy) {
  const vbW = svg.clientWidth || 900;
  const vbH = svg.clientHeight || 600;
  const x = cx == null ? vbW / 2 : cx;
  const y = cy == null ? vbH / 2 : cy;
  const wx = (x - panX) / scale;
  const wy = (y - panY) / scale;
  scale = Math.min(3.5, Math.max(0.25, scale * factor));
  panX = x - wx * scale;
  panY = y - wy * scale;
  applyCamera();
}

function render() {
  const vbW = svg.clientWidth || window.innerWidth - 260;
  const vbH = svg.clientHeight || window.innerHeight - 120;
  svg.setAttribute('viewBox', `0 0 ${vbW} ${vbH}`);
  svg.innerHTML = '';
  legend.innerHTML = LAYER_ORDER.map(l =>
    `<span><i class="swatch" style="background:${COLORS[l]}"></i>${l}</span>`
  ).join('') + `<span><i class="swatch" style="background:${COLORS.agent}"></i>agent</span><span><i class="swatch" style="background:${COLORS.tool}"></i>tool</span>`;

  if (view === 'architecture') renderArchitecture();
  else if (view === 'agents') renderAgents();
  else if (view === 'journeys') renderPathView('journeys');
  else if (view === 'requests') renderPathView('requests');
  else renderPathView('data');

  fitView();
  if (showMermaid) updateMermaid();
}

function renderArchitecture() {
  sideTitle.textContent = 'Layers & hubs';
  const nodes = (DATA.nodes || []).filter(n => n.kind !== 'layer');
  const byLayer = {};
  LAYER_ORDER.forEach(l => byLayer[l] = []);
  nodes.forEach(n => {
    const layer = byLayer[n.layer] ? n.layer : 'application';
    byLayer[layer].push(n);
  });

  sideList.innerHTML = LAYER_ORDER.map(l => {
    const count = byLayer[l].length;
    return `<button class="item" data-id="layer:${l}"><strong>${l}</strong><small>${count} nodes · ${(DATA.layers||[]).find(x=>x.id===l)?.blurb||''}</small></button>`;
  }).join('');
  bindSide();

  const world = worldGroup();
  const padX = 28, padY = 56;
  const colW = 210;
  const cardH = 52;
  const gap = 14;
  const maxCount = Math.max(1, ...LAYER_ORDER.map(l => byLayer[l].length));
  contentW = padX * 2 + LAYER_ORDER.length * colW;
  contentH = padY + maxCount * (cardH + gap) + 40;

  LAYER_ORDER.forEach((l, i) => {
    const x = padX + i * colW;
    const band = el('g');
    const rect = el('rect', {
      x, y: 20, width: colW - 18, height: contentH - 40,
      fill: 'transparent', stroke: '#2a3530', 'stroke-dasharray': '3 6', opacity: 0.75, rx: 8
    });
    const label = el('text', { x: x + 10, y: 42, class: 'layer-label' });
    label.textContent = l;
    band.appendChild(rect); band.appendChild(label); world.appendChild(band);
  });

  const positions = {};
  LAYER_ORDER.forEach((l, i) => {
    const items = byLayer[l];
    const x = padX + i * colW + (colW - 18) / 2;
    items.forEach((n, idx) => {
      positions[n.id] = { x, y: padY + 20 + idx * (cardH + gap), n };
    });
  });

  const edges = (DATA.edges || []).filter(e =>
    positions[e.source] && positions[e.target] && e.kind !== 'contains'
  );
  edges.forEach(e => drawEdge(world, positions[e.source], positions[e.target], e));
  Object.values(positions).forEach((p, i) => drawNode(world, p, false, i * 18));
}

function renderPathView(mode) {
  const nm = nodeMap();
  let items = [];
  if (mode === 'journeys') {
    sideTitle.textContent = 'User journeys';
    items = DATA.journeys || [];
  } else if (mode === 'requests') {
    sideTitle.textContent = 'Request paths';
    items = DATA.requests || [];
  } else {
    sideTitle.textContent = 'Data flows';
    items = DATA.data_flows || [];
  }

  const world = worldGroup();
  if (!items.length) {
    sideList.innerHTML = `<div class="empty">No ${mode} yet.</div>`;
    const t = el('text', { x: 40, y: 80, fill: '#8a9a90', 'font-size': 16 });
    t.textContent = `No ${mode} in this map.`;
    world.appendChild(t);
    contentW = 700; contentH = 320;
    return;
  }

  if (!focusId) focusId = items[0].id;
  sideList.innerHTML = items.map(it => {
    const sub = it.summary || it.route || it.shape || '';
    return `<button class="item ${it.id===focusId?'active':''}" data-id="${esc(it.id)}"><strong>${esc(it.name)}</strong><small>${esc(sub)}</small></button>`;
  }).join('');
  bindSide();

  const current = items.find(i => i.id === focusId) || items[0];
  let stepIds = [];
  if (mode === 'journeys') stepIds = (current.steps || []).map(s => s.node_id || s);
  else if (mode === 'requests') stepIds = current.steps || [];
  else stepIds = [current.origin, ...(current.through||[]), current.destination].filter(Boolean);

  const unique = [];
  stepIds.forEach(id => { if (id && !unique.includes(id)) unique.push(id); });

  const padX = 90, rowY = 220;
  const gap = 190;
  contentW = Math.max(800, padX * 2 + Math.max(unique.length - 1, 1) * gap + 80);
  contentH = 420;

  const title = el('text', { x: 40, y: 48, fill: '#eef4ef', 'font-size': 20, 'font-family': 'Georgia, serif' });
  title.textContent = current.name;
  world.appendChild(title);
  const s = el('text', { x: 40, y: 70, fill: '#8a9a90', 'font-size': 12 });
  s.textContent = current.summary || `${current.method || ''} ${current.route || ''}`.trim();
  world.appendChild(s);

  if (!unique.length) return;

  const positions = {};
  unique.forEach((id, i) => {
    const n = nm[id] || { id, label: id, layer: 'application', kind: 'service', summary: '' };
    positions[id] = { x: padX + i * gap, y: rowY + (i % 2 === 0 ? -28 : 28), n };
  });
  for (let i = 0; i < unique.length - 1; i++) {
    drawEdge(world, positions[unique[i]], positions[unique[i+1]], { kind: 'calls', label: '' }, true);
  }
  Object.values(positions).forEach((p, i) => drawNode(world, p, true, i * 40));
}

function drawNode(parent, p, hot=false, delay=0, strokeOverride=null) {
  const n = p.n;
  const g = el('g', {
    class: 'node-card pop',
    transform: `translate(${p.x},${p.y})`,
    style: `animation-delay:${delay}ms`
  });
  const label = (n.label || n.id || '').slice(0, 26);
  const w = Math.max(128, Math.min(176, label.length * 7.4 + 28));
  const h = 50;
  const color = strokeOverride || COLORS[n.layer] || COLORS.application;
  const rect = el('rect', {
    class: 'card',
    x: -w/2, y: -h/2, width: w, height: h,
    rx: 8, fill: '#171d1a', stroke: color, opacity: hot ? 1 : 0.96
  });
  // subtle animated border glow via second rect
  const glow = el('rect', {
    x: -w/2, y: -h/2, width: w, height: h,
    rx: 8, fill: 'none', stroke: color, opacity: 0.25,
    'stroke-dasharray': '4 10'
  });
  glow.style.animation = 'dashflow 2.4s linear infinite';
  const t = el('text', { x: 0, y: -2, 'text-anchor': 'middle' });
  t.textContent = label;
  const sub = el('text', { x: 0, y: 14, 'text-anchor': 'middle', class: 'sub' });
  sub.textContent = n.kind || '';
  g.appendChild(glow); g.appendChild(rect); g.appendChild(t); g.appendChild(sub);
  g.addEventListener('click', (ev) => { ev.stopPropagation(); showInspector(n); });
  parent.appendChild(g);
}

function drawEdge(parent, a, b, e, hot=false) {
  const path = el('path', {
    class: `edge ${hot ? 'hot' : ''}`,
    d: `M ${a.x} ${a.y} C ${(a.x+b.x)/2} ${a.y}, ${(a.x+b.x)/2} ${b.y}, ${b.x} ${b.y}`,
    stroke: COLORS[a.n.layer] || COLORS.application
  });
  parent.appendChild(path);
}

function bindSide() {
  sideList.querySelectorAll('.item').forEach(btn => {
    btn.addEventListener('click', () => {
      focusId = btn.dataset.id;
      if (view === 'architecture' && focusId.startsWith('layer:')) {
        const layer = focusId.split(':')[1];
        const first = (DATA.nodes||[]).find(n => n.layer === layer && n.kind !== 'layer');
        if (first) showInspector(first);
        sideList.querySelectorAll('.item').forEach(b => b.classList.toggle('active', b.dataset.id === focusId));
        return;
      }
      render();
    });
  });
}

function showInspector(n) {
  inspector.classList.add('open');
  document.getElementById('ins-title').textContent = n.label || n.id;
  document.getElementById('ins-body').textContent = n.summary || 'No summary.';
  document.getElementById('ins-meta').textContent = [
    n.kind && `kind: ${n.kind}`,
    n.layer && `layer: ${n.layer}`,
    n.source && `source: ${n.source}`,
    n.id && `id: ${n.id}`,
  ].filter(Boolean).join('\n');
}

function mermaidForCurrent() {
  const nm = nodeMap();
  if (view === 'agents') {
    const agents = inferAgents();
    if (focusId === '__fleet__' || !focusId) {
      const roots = agents.filter(a => a.level === 'system' || a.level === 'orchestrator');
      const lines = ['flowchart TB'];
      roots.forEach((a, i) => {
        lines.push(`  A${i}["${escM(a.name)}"]`);
      });
      roots.forEach((a, i) => {
        (a.relations || []).forEach(r => {
          const j = roots.findIndex(x => x.id === r.target);
          if (j >= 0) lines.push(`  A${i} -->|${escM(r.label || r.kind)}| A${j}`);
        });
        if (a.parent_id) {
          const j = roots.findIndex(x => x.id === a.parent_id);
          if (j >= 0) lines.push(`  A${j} --> A${i}`);
        }
      });
      return lines.join('\n') || 'flowchart TB\n  A[No agents]';
    }
    const current = agents.find(a => a.id === focusId) || agents[0];
    if (!current) return 'flowchart LR\n  A[No agents]';
    const kids = agents.filter(a => a.parent_id === current.id || (current.flow||[]).includes(a.id));
    const lines = ['flowchart LR', `  ORCH["${escM(current.name)}"]:::agent`];
    kids.forEach((c, i) => {
      lines.push(`  S${i}["${escM(c.name)}"]:::sub`);
      lines.push(`  ORCH --> S${i}`);
      (c.tools || []).forEach((t, ti) => {
        lines.push(`  T${i}_${ti}["${escM(t.name)}"]:::tool`);
        lines.push(`  S${i} --> T${i}_${ti}`);
      });
    });
    (current.tools || []).forEach((t, i) => {
      lines.push(`  OT${i}["${escM(t.name)}"]:::tool`);
      lines.push(`  ORCH --> OT${i}`);
    });
    lines.push('  classDef agent fill:#2a1f18,stroke:#ff9f6b,color:#fff');
    lines.push('  classDef sub fill:#2a2418,stroke:#e2b15c,color:#fff');
    lines.push('  classDef tool fill:#152028,stroke:#9ad7ff,color:#fff');
    return lines.join('\n');
  }
  let items = [];
  let mode = view;
  if (view === 'journeys') items = DATA.journeys || [];
  else if (view === 'requests') items = DATA.requests || [];
  else if (view === 'data') items = DATA.data_flows || [];
  else {
    // architecture overview
    return [
      'flowchart LR',
      '  E[Experience] --> I[Interface]',
      '  I --> A[Application]',
      '  A --> D[Data]',
      '  A --> X[Infra]',
    ].join('\n');
  }
  const current = items.find(i => i.id === focusId) || items[0];
  if (!current) return 'sequenceDiagram\n  participant A as Empty';
  let stepIds = [];
  if (mode === 'journeys') stepIds = (current.steps || []).map(s => s.node_id || s);
  else if (mode === 'requests') stepIds = current.steps || [];
  else stepIds = [current.origin, ...(current.through||[]), current.destination].filter(Boolean);
  const lines = ['sequenceDiagram'];
  const actors = [];
  stepIds.forEach(id => {
    const n = nm[id] || { id, label: id };
    const key = 'N' + actors.length;
    actors.push({ key, label: (n.label || id).slice(0, 28) });
    lines.push(`  participant ${key} as ${escM(actors[actors.length-1].label)}`);
  });
  for (let i = 0; i < actors.length - 1; i++) {
    lines.push(`  ${actors[i].key}->>${actors[i+1].key}: step`);
  }
  return lines.join('\n');
}

async function updateMermaid() {
  const code = mermaidForCurrent();
  const id = 'mmd-' + Date.now();
  try {
    const { svg: out } = await mermaid.render(id, code);
    mermaidTarget.innerHTML = out;
  } catch (err) {
    mermaidTarget.textContent = code + '\n\n// render error: ' + err;
  }
}

function el(name, attrs={}) {
  const node = document.createElementNS('http://www.w3.org/2000/svg', name);
  Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'style') node.setAttribute('style', v);
    else node.setAttribute(k, v);
  });
  return node;
}
function esc(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escM(s) {
  return String(s||'').replace(/[\[\]#;"]/g, ' ');
}

window.addEventListener('resize', () => { render(); });
render();
</script>
